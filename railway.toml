[build]
builder = "NIXPACKS"
nixpacksPlan.phases.setup.aptPkgs = ["poppler-utils"]

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/bootstrap"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Mount a persistent volume at /app/uploads — without it, uploaded assets
# vanish on every redeploy. Configure via Railway UI: Volumes → + → /app/uploads.
