<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="color-scheme" content="light dark"/>
  <!--OG-META-->
  <title data-copy-key="appName">&nbsp;</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='28' fill='%238b6f47'/></svg>"/>
  <style id="theme-vars">
    /* ─── Token defaults — overwritten at runtime by applyPreset() ─────── */
    :root {
      --bg: #faf7f2; --surface: rgba(255,255,255,.72); --surface2:#fff;
      --fg: #1a1a1a; --fgMuted:#5d5a55; --fgSubtle:#8a857d;
      --accent:#8b6f47; --accentFg:#fff; --border:rgba(20,20,20,.10);
      --success:#3f7a5a; --warn:#b87333; --danger:#a83838;
      --fontDisplay:'Fraunces', Georgia, serif;
      --fontBody:'Inter', system-ui, sans-serif;
      --fontMono: ui-monospace, 'SF Mono', Menlo, monospace;
      --trackingTight:-.02em; --trackingBase:0; --trackingLoose:.18em;
      --radiusSm:8px; --radius:14px; --radiusLg:20px;
      --shadow1:0 1px 0 rgba(0,0,0,.04);
      --shadow2:0 12px 32px -16px rgba(40,30,15,.18);
      --maxWidth:680px;
      --motionFast:120ms; --motionBase:240ms; --motionSlow:420ms;
      --heroSurface:translucent;
    }
    *,*::before,*::after { box-sizing:border-box; }
    html,body { margin:0; padding:0; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: var(--fontBody);
      min-height:100dvh; line-height:1.55;
      letter-spacing: var(--trackingBase);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    a { color: var(--accent); text-underline-offset: .25em; }
    main.wrap { max-width: var(--maxWidth); margin: 0 auto; padding: clamp(16px, 4vw, 48px); }

    /* Type — tight headlines with display family, tracked body. */
    h1,h2,h3 { font-family: var(--fontDisplay); font-weight: 500; letter-spacing: var(--trackingTight); margin: 0; }
    h1 { font-size: clamp(2.1rem, 5.4vw, 3.2rem); line-height: 1.05; margin: 0 0 .35em; }
    h2 { font-size: clamp(1.25rem, 2.6vw, 1.6rem); line-height: 1.2; margin: 0 0 .65em; }
    h3 { font-size: 1.1rem; line-height: 1.25; margin: 0 0 .25em; }
    .muted { color: var(--fgMuted); }
    .subtle { color: var(--fgSubtle); }
    .eyebrow {
      font-family: var(--fontBody);
      font-size:.74rem; letter-spacing: var(--trackingLoose); text-transform:uppercase;
      color: var(--accent); margin: 0 0 .9em; font-weight:600;
    }
    .tagline {
      font-family: var(--fontDisplay); font-style: italic;
      color: var(--fgMuted); margin: .2em 0 .4em;
      font-size: clamp(1rem, 1.6vw, 1.15rem);
    }

    /* Cards — surface treatment differs per preset via heroSurface token. */
    .card {
      background: var(--surface);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(18px, 3.6vw, 28px);
      margin: 16px 0;
      box-shadow: var(--shadow1);
    }
    .card.elevated { box-shadow: var(--shadow2); }
    .card.hero { padding: clamp(14px, 2.2vw, 18px); }

    /* Hero treatments. */
    .hero-edge { background: transparent; border: 0; padding: 0; box-shadow: none; backdrop-filter: none; -webkit-backdrop-filter: none; }
    .hero-flat { background: var(--surface2); backdrop-filter: none; -webkit-backdrop-filter: none; }
    .hero-card { box-shadow: var(--shadow2); }
    .hero-media {
      width:100%; aspect-ratio: auto; max-height: 78dvh; object-fit: contain;
      border-radius: calc(var(--radius) - 4px); display:block; background: transparent;
    }

    .hidden { display:none !important; }

    /* Section nav — sticky pill strip. Renders only sections that exist. */
    .section-nav {
      position: sticky; top: 0; z-index: 10;
      display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
      padding: 10px 4px; margin: -8px -4px 4px;
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .section-nav::-webkit-scrollbar { display: none; }
    .section-nav a {
      flex-shrink: 0; text-decoration: none; color: var(--fg);
      font-size: .82em; letter-spacing: .04em; font-weight: 500;
      padding: .4em .9em; border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface2);
      transition: background var(--motionFast) ease, color var(--motionFast) ease, border-color var(--motionFast) ease;
    }
    .section-nav a:hover { border-color: var(--accent); }
    .section-nav a.active { background: var(--accent); color: var(--accentFg); border-color: var(--accent); }

    /* Countdown — four pill tiles, big numeric face. */
    .countdown {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-top: clamp(14px, 2.4vw, 22px);
    }
    .countdown .tile {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: clamp(10px, 2vw, 16px);
      text-align: center;
    }
    .countdown .num {
      font-family: var(--fontDisplay); font-size: clamp(1.6rem, 4.5vw, 2.6rem);
      line-height: 1; font-variant-numeric: tabular-nums; font-weight: 500;
      color: var(--fg); letter-spacing: var(--trackingTight);
    }
    .countdown .unit {
      display: block; margin-top: 4px;
      font-size: .7rem; letter-spacing: var(--trackingLoose); text-transform: uppercase;
      color: var(--fgMuted); font-weight: 600;
    }
    .countdown.past .num { color: var(--fgSubtle); }

    /* Map iframe embed. */
    .map-embed {
      width: 100%; aspect-ratio: 16 / 10;
      border: 1px solid var(--border); border-radius: var(--radiusSm);
      margin-top: 10px; background: var(--surface2);
    }

    /* Plus-one list. */
    .plus-ones { display: grid; gap: 8px; margin-top: 6px; }
    .plus-ones .ph { color: var(--fgSubtle); font-size: .84em; text-transform: none; letter-spacing: 0; font-weight: 400; }

    /* Per-attendee dietary rows. */
    .dietary-host { display: grid; gap: 10px; margin-top: 6px; }
    .per-attendee-row { display: grid; gap: 4px; }
    .per-attendee-name {
      font-size: .82em; color: var(--fgSubtle);
      text-transform: uppercase; letter-spacing: .04em;
    }
    .per-attendee-row textarea { min-height: 52px; }

    /* FAQ accordion. */
    .faq-item {
      border: 1px solid var(--border); border-radius: var(--radiusSm);
      background: var(--surface2); margin-top: 10px; overflow: hidden;
    }
    .faq-item summary {
      list-style: none; cursor: pointer; padding: .9em 1.1em;
      font-weight: 600; font-family: var(--fontDisplay); font-size: 1.02rem;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .faq-item summary::-webkit-details-marker { display: none; }
    .faq-item summary::after {
      content: '+'; font-size: 1.3em; color: var(--accent); font-family: var(--fontBody);
      transition: transform var(--motionFast) ease;
    }
    .faq-item[open] summary::after { content: '\2212'; }
    .faq-item .faq-body {
      padding: 0 1.1em 1em; color: var(--fgMuted);
      line-height: 1.6; white-space: pre-wrap;
    }

    /* Travel / logistics card — same spacing rhythm as Details. */
    .travel-grid { display: grid; gap: 14px; margin-top: 4px; }
    .travel-row .lbl {
      font-size: .72rem; letter-spacing: var(--trackingLoose); text-transform: uppercase;
      color: var(--fgMuted); font-weight: 600; margin-bottom: 4px; font-family: var(--fontBody);
    }
    .travel-row .val { color: var(--fg); white-space: pre-wrap; }
    .travel-row .val a { color: var(--accent); }

    /* Registries list — stacked cards, CTA on each. */
    .registries { display: grid; gap: 10px; margin-top: 4px; }
    .registry {
      display: flex; align-items: center; gap: 14px; justify-content: space-between;
      padding: .9em 1.1em; border: 1px solid var(--border); border-radius: var(--radiusSm);
      background: var(--surface2); flex-wrap: wrap;
    }
    .registry .info { flex: 1 1 200px; min-width: 0; }
    .registry .lbl { font-weight: 600; font-family: var(--fontDisplay); font-size: 1.05rem; margin-bottom: 2px; }
    .registry .note { color: var(--fgMuted); font-size: .88em; }

    /* Timeline — vertical time-axis with event cards offset either side.
       On narrow viewports collapses to a single column. */
    .timeline { position: relative; margin-top: 8px; padding: 4px 0 8px; }
    .timeline::before {
      content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
      width: 1px; background: var(--border); transform: translateX(-.5px);
    }
    .timeline .t-item { position: relative; padding: 10px 0; }
    .timeline .t-item .dot {
      position: absolute; left: 50%; top: 22px; width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); transform: translateX(-50%);
      box-shadow: 0 0 0 4px var(--bg);
    }
    .timeline .t-card {
      width: calc(50% - 22px); padding: 14px 16px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .timeline .t-item:nth-child(odd)  .t-card { margin-left: auto; }
    .timeline .t-item:nth-child(even) .t-card { margin-right: auto; }
    .timeline .t-time {
      font-size: .78em; letter-spacing: var(--trackingLoose); text-transform: uppercase;
      color: var(--fgMuted); font-weight: 600; margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }
    .timeline .t-card h3 { margin: 0 0 .35em; font-size: 1.12rem; }
    .timeline .t-card .meta { color: var(--fgMuted); font-size: .92em; margin: 0 0 .6em; }
    @media (max-width: 540px) {
      .timeline::before { left: 10px; }
      .timeline .t-item .dot { left: 10px; }
      .timeline .t-card { width: calc(100% - 30px); margin-left: 30px !important; margin-right: 0 !important; }
    }

    /* Buttons. */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:.4em;
      appearance:none; border:0; cursor:pointer;
      font: inherit; font-weight:600; letter-spacing: var(--trackingBase);
      padding: .8em 1.25em; border-radius: 999px;
      background: var(--accent); color: var(--accentFg);
      text-decoration: none;
      transition: transform var(--motionFast) ease, opacity var(--motionFast) ease, background var(--motionFast) ease;
    }
    .btn:hover { transform: translateY(-1px); opacity: .94; }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    .btn.ghost { background: transparent; color: var(--fg); border:1px solid var(--border); }
    .btn.ghost:hover { background: var(--surface); }
    .btn.small { padding:.55em .9em; font-size:.88em; }

    /* Layout helpers. */
    .row { display:flex; flex-wrap:wrap; gap: 10px; }
    .grid { display:grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }

    /* Events grid. */
    .event { padding: 18px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); }
    .event h3 { margin: 0 0 .35em; font-size: 1.18rem; }
    .event .meta { color: var(--fgMuted); font-size:.92em; margin: .3em 0 .8em; font-variant-numeric: tabular-nums; }
    .event-hero {
      display: block; width: 100%; height: auto; max-height: 260px;
      object-fit: cover; border-radius: calc(var(--radius) - 2px);
      margin: 0 0 12px;
    }
    .event-gallery {
      display: flex; gap: 8px; overflow-x: auto; margin: 8px 0 10px;
      padding-bottom: 4px; scroll-snap-type: x mandatory;
    }
    .event-gallery a { flex: 0 0 auto; scroll-snap-align: start; }
    .event-gallery img {
      height: 92px; width: auto; border-radius: 6px;
      border: 1px solid var(--border); display: block;
    }
    .chip { display:inline-block; padding:.22em .7em; border-radius: 999px; background: var(--surface2); border:1px solid var(--border); font-size:.78em; margin-right:.4em; }

    /* RSVP form. */
    form.rsvp { display:grid; gap: 14px; }
    form.rsvp label { display:grid; gap: 6px; font-size:.84em; color: var(--fgMuted); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; }
    form.rsvp input, form.rsvp select, form.rsvp textarea {
      font: inherit; color: var(--fg);
      padding: .75em .9em; border:1px solid var(--border); border-radius: var(--radiusSm);
      background: var(--surface2);
      transition: border-color var(--motionFast) ease, box-shadow var(--motionFast) ease;
      letter-spacing: var(--trackingBase); text-transform: none; font-weight: 400;
    }
    form.rsvp input:focus, form.rsvp select:focus, form.rsvp textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    form.rsvp textarea { min-height: 96px; resize: vertical; }
    form.rsvp .form-msg { min-height: 1.4em; font-size: .92em; letter-spacing: 0; text-transform: none; font-weight: 400; }
    form.rsvp .form-msg.is-error { color: var(--danger); }
    form.rsvp .form-msg.is-success { color: var(--success); }

    /* Status radio chips. */
    .status-options { display:flex; flex-wrap:wrap; gap:8px; }
    .status-options label {
      display:flex; align-items:center; gap:.5em;
      padding:.55em 1em; border:1px solid var(--border); border-radius:999px;
      cursor:pointer; color: var(--fg); background: var(--surface2);
      font-size: .92em; text-transform: none; letter-spacing: 0; font-weight: 500;
      transition: background var(--motionFast) ease, border-color var(--motionFast) ease, color var(--motionFast) ease;
    }
    .status-options label:has(input:checked) { background: var(--accent); color: var(--accentFg); border-color: var(--accent); }
    .status-options input[type=radio] { position: absolute; opacity: 0; pointer-events: none; }

    /* Per-event RSVP row. */
    .event-grid-rsvp { display:grid; gap:10px; }
    .event-row { display:flex; justify-content:space-between; align-items:center; gap: 10px; padding:.7em 1em; border:1px solid var(--border); border-radius: var(--radiusSm); background: var(--surface2); }
    .event-row .seg { display:flex; gap:6px; }
    .event-row .seg button {
      appearance:none; border:1px solid var(--border); background:transparent;
      padding:.4em .85em; border-radius:999px; font-size:.82em; cursor:pointer; color: var(--fg);
      transition: background var(--motionFast) ease, color var(--motionFast) ease, border-color var(--motionFast) ease;
    }
    .event-row .seg button.active { background: var(--accent); color: var(--accentFg); border-color: var(--accent); }
    .event-row .seg button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Hosts strip. */
    .hosts { display:flex; flex-wrap:wrap; gap:8px; }
    .host { padding:.4em .9em; border-radius:999px; background:var(--surface2); border:1px solid var(--border); font-size:.92em; }

    /* Pager + not-found. */
    .pager { display:flex; justify-content:center; gap:10px; margin-top:10px; }
    .pager button { appearance:none; border:1px solid var(--border); background:transparent; color:var(--fg); padding:.45em .9em; border-radius:999px; cursor:pointer; }
    .not-found { text-align:center; padding: 60px 20px; }

    /* Reveal-on-enter motion. Each .reveal section starts hidden + offset, the
       observer toggles .visible to fade it in. Disabled under reduced-motion. */
    .reveal { opacity: 0; transform: translateY(14px); transition: opacity var(--motionBase) ease-out, transform var(--motionBase) ease-out; }
    .reveal.visible { opacity: 1; transform: none; }

    /* Focus rings on every interactive element. */
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }

    @media (prefers-color-scheme: dark) {
      :root.dm-auto { --bg:#0f0f10; --fg:#f2eee7; --fgMuted:#a9a6a0; --surface:rgba(30,30,30,.55); --surface2:#1a1a1a; }
    }
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      .btn { transition: none; }
      .btn:hover { transform: none; }
      * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }
  </style>
</head>
<body>
  <main class="wrap" id="app">
    <div class="card"><p class="muted" data-copy-key="loading">Loading\u2026</p></div>
  </main>

  <script>
  (() => {
    'use strict';

    const qs  = (s, r=document) => r.querySelector(s);
    const ce  = (tag, attrs={}, children=[]) => {
      const el = document.createElement(tag);
      for (const [k,v] of Object.entries(attrs)) {
        if (k === 'class') el.className = v;
        else if (k === 'html') el.innerHTML = v;
        else if (k === 'text') el.textContent = v;
        else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
        else if (v !== undefined && v !== null && v !== false) el.setAttribute(k, v);
      }
      for (const c of [].concat(children)) if (c != null) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      return el;
    };

    // Apply a preset bundle ({ tokens, fontHref, active, label }). Sets every
    // CSS custom property + injects the preset's Google Fonts link tag.
    function applyPreset(theme) {
      if (!theme) return;
      const root = document.documentElement;
      const tokens = theme.tokens || {};
      for (const [name, value] of Object.entries(tokens)) {
        if (value === '' || value == null) continue;
        root.style.setProperty('--' + name, String(value));
      }
      if (theme.active) root.setAttribute('data-preset', theme.active);
      if (theme.fontHref) ensureFontLink(theme.fontHref);
    }

    // Idempotent: only injects the <link> once per href.
    function ensureFontLink(href) {
      if (!href) return;
      const existing = document.querySelector(`link[data-preset-font="1"]`);
      if (existing && existing.getAttribute('href') === href) return;
      if (existing) existing.remove();
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = href;
      link.setAttribute('data-preset-font', '1');
      document.head.appendChild(link);
    }

    // Reveal-on-enter via IntersectionObserver. No-op under reduced motion
    // because the CSS rule short-circuits the transition anyway.
    function observeReveals(host) {
      if (!('IntersectionObserver' in window)) return;
      const io = new IntersectionObserver((entries) => {
        for (const e of entries) {
          if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
        }
      }, { threshold: 0.08 });
      host.querySelectorAll('.reveal').forEach((el) => io.observe(el));
    }

    function getToken() {
      const u = new URL(window.location.href);
      return u.searchParams.get('token') || '';
    }

    async function fetchPayload() {
      const token = getToken();
      const url = '/api/public-invite' + (token ? `?token=${encodeURIComponent(token)}` : '');
      const r = await fetch(url);
      if (!r.ok) return { ok: false, error: 'Network error' };
      return r.json();
    }

    // If the guest belongs to a segment that declares includesEventIds,
    // return events limited to that set. Otherwise return events unchanged.
    // Segments without includesEventIds (or empty) are treated as "all events".
    function applySegmentFilter(events, segments, guest) {
      if (!events || !events.length || !guest || !guest.segment) return events || [];
      const seg = (segments || []).find(s => s && s.id === guest.segment);
      if (!seg || !Array.isArray(seg.includesEventIds) || !seg.includesEventIds.length) return events;
      const allow = new Set(seg.includesEventIds);
      return events.filter(ev => allow.has(ev.id || ev.name));
    }

    // Countdown pegged to event.dateISO. Renders "Days / Hours / Min / Sec"
    // until the date; after it, shows a soft "Today" / "Celebration past" state.
    // Cleaned up via clearInterval when the page unloads (observed by mutation).
    function renderCountdown(dateISO) {
      if (!dateISO) return null;
      const target = Date.parse(dateISO);
      if (!Number.isFinite(target)) return null;
      const root = ce('div', { class: 'countdown reveal', 'aria-live': 'off' });
      const tiles = { d: ce('div', { class: 'num', text: '—' }),
                      h: ce('div', { class: 'num', text: '—' }),
                      m: ce('div', { class: 'num', text: '—' }),
                      s: ce('div', { class: 'num', text: '—' }) };
      const LABELS = [['d','Days'],['h','Hours'],['m','Min'],['s','Sec']];
      for (const [k, lbl] of LABELS) {
        root.appendChild(ce('div', { class: 'tile' }, [tiles[k], ce('span', { class: 'unit', text: lbl })]));
      }
      const tick = () => {
        const diff = target - Date.now();
        if (diff <= 0) { root.classList.add('past'); Object.values(tiles).forEach(t => t.textContent = '0'); return false; }
        const s = Math.floor(diff / 1000);
        tiles.d.textContent = String(Math.floor(s / 86400));
        tiles.h.textContent = String(Math.floor((s % 86400) / 3600)).padStart(2, '0');
        tiles.m.textContent = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
        tiles.s.textContent = String(s % 60).padStart(2, '0');
        return true;
      };
      if (!tick()) return root;
      const iv = setInterval(() => { if (!tick()) clearInterval(iv); }, 1000);
      return root;
    }

    // Sticky section nav: renders pill links for each section present in the
    // DOM. Uses IntersectionObserver to toggle .active on the currently
    // visible section, so the highlight tracks scroll.
    function mountSectionNav(host, sections) {
      const live = sections.filter(s => s && s.el);
      if (live.length < 2) return;  // 0-1 sections: no point navigating
      const nav = ce('nav', { class: 'section-nav', 'aria-label': 'Page sections' });
      const links = new Map();
      for (const s of live) {
        s.el.id = s.id;
        const a = ce('a', { href: '#' + s.id, text: s.label, onclick: (e) => {
          e.preventDefault();
          s.el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', '#' + s.id);
        }});
        nav.appendChild(a);
        links.set(s.id, a);
      }
      host.insertBefore(nav, host.firstChild);

      if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver((entries) => {
          // Use the most-visible entry that is intersecting.
          let best = null;
          for (const e of entries) {
            if (!e.isIntersecting) continue;
            if (!best || e.intersectionRatio > best.intersectionRatio) best = e;
          }
          if (!best) return;
          const id = best.target.id;
          links.forEach((a, key) => a.classList.toggle('active', key === id));
        }, { threshold: [0.15, 0.5, 0.85], rootMargin: '-64px 0px -40% 0px' });
        live.forEach(s => io.observe(s.el));
      }
    }

    function pickHeroAsset(payload) {
      const assets = payload.assets || {};
      const heroes = (assets.byRole && assets.byRole.hero) || [];
      // Main hero = hero asset with no event_id. Per-event heroes render
      // inside their own event card, not as the page-level hero.
      return heroes.find(h => !h.eventId) || null;
    }

    // Images attached to a specific sub-event, preferring its hero first
    // then any gallery entries. Caller picks which ones to render.
    function assetsForEvent(payload, eventId) {
      const all = (payload.assets && payload.assets.byEvent && payload.assets.byEvent[eventId]) || [];
      const heroes  = all.filter(a => a.role === 'hero');
      const gallery = all.filter(a => a.role === 'gallery');
      return { heroes, gallery, all };
    }

    function renderHero(asset, title, subtitle, copy, surfaceHint, event) {
      // heroSurface token controls how the hero is framed.
      //   'edge'        — no card chrome, asset goes edge-to-edge
      //   'flat'        — opaque surface, no blur
      //   'translucent' — default, blurred translucent card
      //   'card'        — solid card with elevated shadow
      // Auto-promote to 'edge' when the asset is a PDF or PNG — opaque/chromed
      // uploads look wrong inside a translucent card. 'card' override wins.
      let surface = surfaceHint || 'translucent';
      if (asset && asset.mime && surface !== 'card' && surface !== 'edge') {
        if (asset.mime === 'application/pdf' || asset.mime === 'image/png') {
          surface = 'edge';
        }
      }
      const surfaceClass =
        surface === 'edge' ? 'card hero hero-edge reveal' :
        surface === 'flat' ? 'card hero hero-flat reveal' :
        surface === 'card' ? 'card hero hero-card reveal' :
                             'card hero reveal';
      const wrap = ce('section', { class: surfaceClass });
      if (asset) {
        if (asset.mime && asset.mime.startsWith('video/')) {
          wrap.appendChild(ce('video', { class: 'hero-media', src: `/api/asset/${asset.id}/full`, controls: 'controls', playsinline: 'playsinline', preload: 'metadata' }));
        } else if (asset.mime === 'application/pdf') {
          const img = ce('img', { class: 'hero-media', src: `/api/asset/${asset.id}/full`, alt: title });
          wrap.appendChild(img);
          if (asset.pageCount > 1) {
            const pager = ce('div', { class: 'pager' });
            pager.appendChild(ce('a', { class: 'btn small ghost', href: `/api/asset/${asset.id}/original`, target: '_blank', rel: 'noopener',
              text: (copy && copy.openFullInvite) || 'Open full invite' }));
            wrap.appendChild(pager);
          }
        } else {
          wrap.appendChild(ce('img', { class: 'hero-media', src: `/api/asset/${asset.id}/full`, alt: title, loading: 'eager' }));
        }
      } else {
        // Text-only fallback hero — uses display type for impact.
        wrap.appendChild(ce('p', { class: 'eyebrow', text: (copy && copy.inviteHeaderCta) || 'You\u2019re Invited' }));
        if (title)                       wrap.appendChild(ce('h1', { text: title }));
        if (event && event.hostedBy)     wrap.appendChild(ce('p',  { class: 'tagline', text: event.hostedBy }));
        if (subtitle)                    wrap.appendChild(ce('p',  { class: 'muted',   text: subtitle }));
        if (copy && copy.heroFallback)   wrap.appendChild(ce('p',  { class: 'muted',   text: copy.heroFallback }));
      }
      const cd = renderCountdown(event && event.dateISO);
      if (cd) wrap.appendChild(cd);
      return wrap;
    }

    function renderDetails(event, copy) {
      if (!event) return null;
      const anyContent = [event.title, event.hostedBy, event.dateLabel, event.timeLabel,
                         event.venue, event.address, event.city, event.mapsUrl, event.mapsEmbedUrl,
                         event.dressCode, event.contactEmail,
                         event.contactPhone, event.rsvpDeadline].some(v => v && String(v).trim());
      if (!anyContent) return null;

      const card = ce('section', { class: 'card reveal' });
      card.appendChild(ce('h2', { text: copy.detailsHeader || 'Details' }));

      const row = (label, value) => {
        if (!value) return null;
        return ce('p', {}, [
          ce('span', { class: 'muted', text: `${label}: ` }),
          ce('span', { text: String(value) }),
        ]);
      };

      [
        row('Date', [event.dateLabel, event.timeLabel].filter(Boolean).join(' \u00b7 ')),
        row('Venue', [event.venue, event.address, event.city].filter(Boolean).join(', ')),
        row('Dress Code', event.dressCode),
        row('RSVP by', event.rsvpDeadline),
      ].forEach(el => { if (el) card.appendChild(el); });

      const actions = ce('div', { class: 'row', style: 'margin-top:8px;' });
      // If admin set a full embed URL, render the iframe instead of the
      // small "Open map" button. mapsUrl still powers the ICS/backup link.
      if (event.mapsEmbedUrl) {
        card.appendChild(ce('iframe', {
          class: 'map-embed',
          src: event.mapsEmbedUrl,
          loading: 'lazy',
          referrerpolicy: 'no-referrer-when-downgrade',
          allowfullscreen: 'allowfullscreen',
          title: 'Venue map',
        }));
      } else if (event.mapsUrl) {
        actions.appendChild(ce('a', { class: 'btn small ghost', href: event.mapsUrl, target: '_blank', rel: 'noopener', text: 'Open map' }));
      }
      // Gift registry moved into its own Registries section; don't render
      // the inline button here.
      if (actions.children.length) card.appendChild(actions);

      return card;
    }

    // Registries card. Each { label, url, note }. `giftRegistry` legacy
    // string is promoted server-side, so we always read from `registries`.
    function renderRegistries(event, copy) {
      const items = Array.isArray(event && event.registries) ? event.registries.filter(r => r && r.url) : [];
      if (!items.length) return null;
      const card = ce('section', { class: 'card reveal' });
      card.appendChild(ce('h2', { text: copy.registriesHeader || 'Gifts' }));
      const list = ce('div', { class: 'registries' });
      for (const r of items) {
        const info = ce('div', { class: 'info' });
        info.appendChild(ce('div', { class: 'lbl', text: r.label || copy.giftRegistryLink || 'Gift Registry' }));
        if (r.note) info.appendChild(ce('div', { class: 'note', text: r.note }));
        const row = ce('div', { class: 'registry' }, [
          info,
          ce('a', { class: 'btn small ghost', href: r.url, target: '_blank', rel: 'noopener',
            text: copy.registryView || 'View' }),
        ]);
        list.appendChild(row);
      }
      card.appendChild(list);
      return card;
    }

    // Travel / logistics card. Each field optional; hide card if all empty.
    function renderTravel(event, copy) {
      const t = (event && event.travel) || {};
      const rows = [
        ['hotelBlock',    copy.travelHotel     || 'Hotel block',   t.hotelBlock],
        ['parking',       copy.travelParking   || 'Parking',       t.parking],
        ['transport',     copy.travelTransport || 'Transport',     t.transport],
        ['accessibility', copy.travelAccess    || 'Accessibility', t.accessibility],
      ].filter(([, , v]) => v && String(v).trim());
      if (!rows.length && !t.hotelUrl) return null;

      const card = ce('section', { class: 'card reveal' });
      card.appendChild(ce('h2', { text: copy.travelHeader || 'Travel' }));
      const grid = ce('div', { class: 'travel-grid' });

      // Hotel block + hotelUrl render as a single row: text + CTA button.
      if (t.hotelBlock || t.hotelUrl) {
        const row = ce('div', { class: 'travel-row' });
        row.appendChild(ce('div', { class: 'lbl', text: copy.travelHotel || 'Hotel block' }));
        const val = ce('div', { class: 'val', text: t.hotelBlock || '' });
        if (t.hotelUrl) {
          const actions = ce('div', { class: 'row', style: 'margin-top:6px;' }, [
            ce('a', { class: 'btn small ghost', href: t.hotelUrl, target: '_blank', rel: 'noopener',
              text: copy.travelHotelCta || 'Book room' }),
          ]);
          val.appendChild(actions);
        }
        row.appendChild(val);
        grid.appendChild(row);
      }
      for (const [key, lbl, v] of rows) {
        if (key === 'hotelBlock') continue;  // already rendered above
        const row = ce('div', { class: 'travel-row' }, [
          ce('div', { class: 'lbl', text: lbl }),
          ce('div', { class: 'val', text: v }),
        ]);
        grid.appendChild(row);
      }
      card.appendChild(grid);
      return card;
    }

    // FAQ accordion via <details>/<summary>. Each item { q, a }.
    function renderFaq(event, copy) {
      const items = Array.isArray(event && event.faq) ? event.faq.filter(x => x && (x.q || x.a)) : [];
      if (!items.length) return null;
      const card = ce('section', { class: 'card reveal' });
      card.appendChild(ce('h2', { text: copy.faqHeader || 'FAQ' }));
      for (const it of items) {
        const body = ce('div', { class: 'faq-body', text: it.a || '' });
        const det  = ce('details', { class: 'faq-item' }, [
          ce('summary', { text: it.q || '' }),
          body,
        ]);
        card.appendChild(det);
      }
      return card;
    }

    // Timeline view for sub-events — replaces the flat grid whenever there
    // are 2+ events. Each event is rendered on the vertical spine with the
    // card offset left/right, and its time shown inline.
    function renderTimeline(events, copy, features, payload) {
      if (!events || events.length <= 1) return null;
      const card = ce('section', { class: 'card reveal' });
      card.appendChild(ce('h2', { text: copy.eventsHeader || 'Events' }));
      const wrap = ce('div', { class: 'timeline' });
      for (const ev of events) {
        const item = ce('div', { class: 't-item' });
        item.appendChild(ce('div', { class: 'dot' }));
        const box = ce('div', { class: 't-card' });
        const { heroes, gallery } = payload ? assetsForEvent(payload, ev.id || ev.name) : { heroes: [], gallery: [] };
        const evHero = heroes[0];
        if (evHero) {
          box.appendChild(ce('img', { class: 'event-hero', src: `/api/asset/${evHero.id}/full`, alt: ev.name || '', loading: 'lazy' }));
        }
        const time = [ev.dateLabel, ev.timeLabel].filter(Boolean).join(' \u00b7 ');
        if (time) box.appendChild(ce('div', { class: 't-time', text: time }));
        box.appendChild(ce('h3', { text: ev.name }));
        if (ev.venue) box.appendChild(ce('div', { class: 'meta', text: [ev.venue, ev.address, ev.city].filter(Boolean).join(', ') }));
        if (ev.description) box.appendChild(ce('p', { text: ev.description }));
        if (gallery.length) {
          const strip = ce('div', { class: 'event-gallery' });
          for (const g of gallery) {
            strip.appendChild(ce('a', { href: `/api/asset/${g.id}/full`, target: '_blank', rel: 'noopener' }, [
              ce('img', { src: `/api/asset/${g.id}/thumb`, alt: g.filename || '', loading: 'lazy' }),
            ]));
          }
          box.appendChild(strip);
        }
        const actions = ce('div', { class: 'row' });
        if (ev.mapsUrl) actions.appendChild(ce('a', { class: 'btn small ghost', href: ev.mapsUrl, target: '_blank', rel: 'noopener', text: 'Map' }));
        if (features && features.calendarExport) {
          actions.appendChild(ce('button', { class: 'btn small ghost', type: 'button',
            onclick: () => downloadIcs(ev) }, [copy.downloadCalendar || 'Add to Calendar']));
        }
        if (actions.children.length) box.appendChild(actions);
        item.appendChild(box);
        wrap.appendChild(item);
      }
      card.appendChild(wrap);
      return card;
    }

    function renderHosts(hosts, copy) {
      if (!hosts || !hosts.length) return null;
      // Accept any of the historical shapes — Settings uses {id,label,slug}
      // while the wizard used to save {slug,name}. Skip rows with no human
      // label; rendering a raw slug looks broken.
      const labelFor = (h) => (h && (h.label || h.name)) || '';
      const visible = hosts.filter(h => labelFor(h).trim());
      if (!visible.length) return null;
      const card = ce('section', { class: 'card reveal' });
      card.appendChild(ce('h2', { text: copy.hostsHeader || 'Hosted By' }));
      const strip = ce('div', { class: 'hosts' });
      for (const h of visible) {
        const chip = ce('span', { class: 'host' }, [
          ce('span', { class: 'host-label', text: labelFor(h) }),
        ]);
        if (h.role) chip.appendChild(ce('span', { class: 'host-role muted', text: ' \u00b7 ' + h.role }));
        strip.appendChild(chip);
      }
      card.appendChild(strip);
      return card;
    }

    function renderEvents(events, copy, features, payload) {
      if (!events || events.length <= 1) return null;
      const card = ce('section', { class: 'card reveal' });
      card.appendChild(ce('h2', { text: copy.eventsHeader || 'Events' }));
      const grid = ce('div', { class: 'grid' });
      for (const ev of events) {
        const box = ce('div', { class: 'event' });
        // Per-event hero (if any) gets rendered above the name. Falls back
        // to no image gracefully.
        const { heroes, gallery } = payload ? assetsForEvent(payload, ev.id || ev.name) : { heroes: [], gallery: [] };
        const evHero = heroes[0];
        if (evHero) {
          const img = ce('img', { class: 'event-hero', src: `/api/asset/${evHero.id}/full`, alt: ev.name || '', loading: 'lazy' });
          box.appendChild(img);
        }
        box.appendChild(ce('h3', { text: ev.name }));
        const metaBits = [ev.dateLabel, ev.timeLabel, ev.venue].filter(Boolean).join(' \u00b7 ');
        if (metaBits) box.appendChild(ce('div', { class: 'meta', text: metaBits }));
        if (ev.description) box.appendChild(ce('p', { text: ev.description }));
        // Gallery strip — horizontal-scrolling thumbnails. Clicking opens
        // the full image in a new tab (lightbox is a later polish).
        if (gallery.length) {
          const strip = ce('div', { class: 'event-gallery' });
          for (const g of gallery) {
            strip.appendChild(ce('a', { href: `/api/asset/${g.id}/full`, target: '_blank', rel: 'noopener' }, [
              ce('img', { src: `/api/asset/${g.id}/thumb`, alt: g.filename || '', loading: 'lazy' }),
            ]));
          }
          box.appendChild(strip);
        }
        const actions = ce('div', { class: 'row' });
        if (ev.mapsUrl) actions.appendChild(ce('a', { class: 'btn small ghost', href: ev.mapsUrl, target: '_blank', rel: 'noopener', text: 'Map' }));
        if (features && features.calendarExport) {
          actions.appendChild(ce('button', { class: 'btn small ghost', type: 'button',
            onclick: () => downloadIcs(ev) }, [copy.downloadCalendar || 'Add to Calendar']));
        }
        if (actions.children.length) box.appendChild(actions);
        grid.appendChild(box);
      }
      card.appendChild(grid);
      return card;
    }

    function renderRsvpForm(payload) {
      if (!payload.features.publicRsvp) return null;
      const copy    = payload.copy;
      const rsvp    = payload.rsvp;
      const guest   = payload.guest;
      const fields  = rsvp.fields || {};
      const events  = payload.events || [];
      const statusOptions = rsvp.statusOptions || ['Attending','Maybe','Declined'];

      const card = ce('section', { class: 'card reveal' });
      card.appendChild(ce('h2', { text: copy.rsvpHeader || 'RSVP' }));

      const form = ce('form', { class: 'rsvp' });
      const state = {
        name:      guest ? guest.guestName : '',
        partySize: guest ? (guest.confirmedPartySize ?? guest.partySize ?? 1) : 1,
        rsvp:      guest && guest.rsvp && guest.rsvp !== 'Pending' ? guest.rsvp : statusOptions[0],
        notes:     guest ? guest.notes   || '' : '',
        phone:     guest ? guest.mobileNumber || '' : '',
        email:     guest ? guest.emailAddress  || '' : '',
        selections: (guest && guest.eventSelections) || [],
        partyMembers: (guest && Array.isArray(guest.partyMembers)) ? guest.partyMembers.slice() : [],
        // Dietary stored positionally per attendee (0 = primary, 1.. = plus-ones)
        dietaryEntries: (function () {
          const raw = guest ? guest.dietary : '';
          if (Array.isArray(raw)) return raw.map(d => String(d && d.text || ''));
          return [String(raw || '')];
        })(),
      };

      const updateSelection = (id, name, status) => {
        const existing = state.selections.find(x => (x.id || x.name) === id);
        if (existing) existing.status = status; else state.selections.push({ id, name, status });
        renderEventButtons();
      };

      if (fields.name && fields.name.enabled) {
        const input = ce('input', { type: 'text', name: 'name', required: fields.name.required ? 'required' : undefined, value: state.name });
        input.addEventListener('input', (e) => { state.name = e.target.value; renderDietary(); });
        form.appendChild(ce('label', {}, [fields.name.label || 'Your Name', input]));
      }

      // Status radios
      const statusWrap = ce('div', { class: 'status-options' });
      for (const opt of statusOptions) {
        const id = 'st-' + opt.toLowerCase();
        const radio = ce('input', { type: 'radio', name: 'rsvp-status', id, value: opt, checked: state.rsvp === opt ? 'checked' : undefined });
        radio.addEventListener('change', () => state.rsvp = opt);
        statusWrap.appendChild(ce('label', { for: id }, [radio, opt]));
      }
      form.appendChild(statusWrap);

      // Hoisted together so renderPlusOnes can call renderDietary without TDZ.
      let plusOnesHost = null;
      let dietaryHost  = null;
      function renderPlusOnes() {
        if (!plusOnesHost) return;
        plusOnesHost.innerHTML = '';
        const extra = Math.max(0, Number(state.partySize) - 1);
        if (extra <= 0) { renderDietary(); return; }
        // Pad / trim the stored array to the current extra-guest count.
        if (state.partyMembers.length > extra) state.partyMembers.length = extra;
        while (state.partyMembers.length < extra) state.partyMembers.push('');
        for (let i = 0; i < extra; i++) {
          const inp = ce('input', { type: 'text', value: state.partyMembers[i] || '', placeholder: `Guest ${i + 2}` });
          inp.addEventListener('input', (e) => { state.partyMembers[i] = e.target.value; renderDietary(); });
          plusOnesHost.appendChild(inp);
        }
        renderDietary();
      }
      if (fields.partySize && fields.partySize.enabled) {
        const input = ce('input', { type: 'number', name: 'partySize', min: '0', max: String(fields.partySize.max || 10), value: String(state.partySize) });
        input.addEventListener('input', (e) => { state.partySize = Number(e.target.value) || 0; renderPlusOnes(); });
        form.appendChild(ce('label', {}, [fields.partySize.label || 'Party Size', input]));
        plusOnesHost = ce('div', { class: 'plus-ones' });
        form.appendChild(ce('label', {}, ['Names of other guests', plusOnesHost,
          ce('span', { class: 'ph', text: 'We\u2019ll use these on your place cards and meal assignments.' })]));
        renderPlusOnes();
      }

      let eventButtonsHost = null;
      function renderEventButtons() {
        if (!eventButtonsHost) return;
        eventButtonsHost.innerHTML = '';
        for (const ev of events) {
          const id = ev.id || ev.name;
          const row = ce('div', { class: 'event-row' });
          row.appendChild(ce('div', {}, [ev.name, ev.dateLabel ? ce('span', { class: 'muted', text: ` \u00b7 ${ev.dateLabel}` }) : null]));
          const seg = ce('div', { class: 'seg' });
          for (const s of ['attending','maybe','declined']) {
            const cur = state.selections.find(x => (x.id || x.name) === id);
            const active = cur && cur.status === s;
            const btn = ce('button', { type: 'button', class: active ? 'active' : '', onclick: () => updateSelection(id, ev.name, s) }, [s[0].toUpperCase()+s.slice(1)]);
            seg.appendChild(btn);
          }
          row.appendChild(seg);
          eventButtonsHost.appendChild(row);
        }
      }
      if (fields.perEvent && fields.perEvent.enabled && events.length > 1) {
        eventButtonsHost = ce('div', { class: 'event-grid-rsvp' });
        const lbl = ce('label', {}, [fields.perEvent.label || 'Which events?', eventButtonsHost]);
        form.appendChild(lbl);
        renderEventButtons();
      }

      function renderDietary() {
        if (!dietaryHost) return;
        dietaryHost.innerHTML = '';
        const partyCount = Math.max(1, Number(state.partySize) || 1);
        if (state.dietaryEntries.length > partyCount) state.dietaryEntries.length = partyCount;
        while (state.dietaryEntries.length < partyCount) state.dietaryEntries.push('');
        if (partyCount <= 1) {
          const input = ce('input', { type: 'text', value: state.dietaryEntries[0] || '' });
          input.addEventListener('input', (e) => state.dietaryEntries[0] = e.target.value);
          dietaryHost.appendChild(input);
          return;
        }
        const labels = [String(state.name || '').trim() || 'Guest 1'];
        for (let i = 0; i < partyCount - 1; i++) {
          labels.push(String(state.partyMembers[i] || '').trim() || `Guest ${i + 2}`);
        }
        for (let i = 0; i < partyCount; i++) {
          const ta = ce('textarea', { rows: '2', placeholder: 'None / any notes' });
          ta.value = state.dietaryEntries[i] || '';
          ta.addEventListener('input', (e) => state.dietaryEntries[i] = e.target.value);
          const row = ce('div', { class: 'per-attendee-row' }, [
            ce('div', { class: 'per-attendee-name', text: labels[i] }),
            ta
          ]);
          dietaryHost.appendChild(row);
        }
      }
      if (fields.dietary && fields.dietary.enabled) {
        dietaryHost = ce('div', { class: 'dietary-host' });
        form.appendChild(ce('label', {}, [fields.dietary.label || 'Dietary preferences', dietaryHost]));
        renderDietary();
      }

      if (fields.notes && fields.notes.enabled) {
        const input = ce('textarea', { name: 'notes' });
        input.value = state.notes;
        input.addEventListener('input', (e) => state.notes = e.target.value);
        form.appendChild(ce('label', {}, [fields.notes.label || 'Notes', input]));
      }

      const msg = ce('p', { class: 'form-msg', role: 'status', 'aria-live': 'polite' });
      const btnLabel = guest && guest.rsvp && guest.rsvp !== 'Pending' ? (copy.rsvpUpdateButton || 'Update Response') : (copy.rsvpButton || 'Send RSVP');
      const submit = ce('button', { class: 'btn', type: 'submit' }, [btnLabel]);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.className = 'form-msg';
        if (!state.name || !state.name.trim()) {
          msg.textContent = 'Name is required.'; msg.classList.add('is-error'); return;
        }
        submit.disabled = true; msg.textContent = '';
        const partyCount = Math.max(1, Number(state.partySize) || 1);
        let dietaryValue;
        if (fields.dietary && fields.dietary.enabled && partyCount > 1) {
          const names = [state.name || 'Guest 1', ...state.partyMembers];
          dietaryValue = [];
          for (let i = 0; i < partyCount; i++) {
            const nm = String(names[i] || '').trim() || `Guest ${i + 1}`;
            const txt = String(state.dietaryEntries[i] || '').trim();
            if (txt) dietaryValue.push({ name: nm, text: txt });
          }
        } else {
          dietaryValue = String(state.dietaryEntries[0] || '').trim();
        }
        const body = {
          token:     getToken(),
          name:      state.name,
          phone:     state.phone,
          email:     state.email,
          partySize: state.partySize,
          segment:   (guest && guest.segment) || '',
          rsvp:      state.rsvp,
          notes:     state.notes,
          dietary:   dietaryValue,
          eventSelections: state.selections,
          partyMembers: state.partyMembers.map(s => String(s || '').trim()).filter(Boolean),
        };
        try {
          const r = await fetch('/api/rsvp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
          const data = await r.json();
          if (!r.ok || !data.ok) {
            msg.textContent = data.error || 'Something went wrong.';
            msg.classList.add('is-error'); submit.disabled = false; return;
          }
          msg.textContent = copy.rsvpSubmitted || 'Your response has been recorded.';
          msg.classList.add('is-success');
          submit.textContent = copy.rsvpUpdateButton || 'Update Response';
          submit.disabled = false;
        } catch (err) {
          msg.textContent = 'Network error — please try again.';
          msg.classList.add('is-error'); submit.disabled = false;
        }
      });

      form.appendChild(submit);
      form.appendChild(msg);
      card.appendChild(form);
      return card;
    }

    // Share card. Tries navigator.share() first (native sheet on mobile),
    // falls back to clipboard on desktop / unsupported browsers. The shared
    // URL is intentionally the token-stripped public URL — personal invite
    // tokens are per-guest and must not leak when someone hits "Share".
    function renderShare(event, copy, features) {
      if (!(features && features.shareButton)) return null;
      const card = ce('section', { class: 'card reveal share-card' });
      card.appendChild(ce('h2', { text: copy.shareHeader || 'Share' }));
      const btn = ce('button', { class: 'btn', type: 'button', text: copy.shareLabel || 'Share this invite' });
      const publicShareUrl = () => location.origin + location.pathname;
      btn.addEventListener('click', async () => {
        const url = publicShareUrl();
        const data = { title: (event && event.title) || document.title, text: copy.shareText || '', url };
        try {
          if (navigator.share && typeof navigator.share === 'function') {
            await navigator.share(data);
            return;
          }
        } catch (_) { /* user-cancelled or share threw — fall through to copy */ }
        try {
          await navigator.clipboard.writeText(url);
          const original = btn.textContent;
          btn.textContent = copy.shareCopied || 'Link copied \u2713';
          btn.disabled = true;
          setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1800);
        } catch (_) { /* no clipboard perms — silently give up */ }
      });
      card.appendChild(btn);
      return card;
    }

    function renderContact(event, copy) {
      const hasEmail = event && event.contactEmail;
      const hasPhone = event && event.contactPhone;
      if (!hasEmail && !hasPhone) return null;
      const card = ce('section', { class: 'card reveal' });
      card.appendChild(ce('h2', { text: copy.contactHeader || 'Questions?' }));
      const row = ce('div', { class: 'row' });
      if (hasEmail) row.appendChild(ce('a', { class: 'btn small ghost', href: `mailto:${event.contactEmail}`, text: event.contactEmail }));
      if (hasPhone) row.appendChild(ce('a', { class: 'btn small ghost', href: `tel:${event.contactPhone}`, text: event.contactPhone }));
      card.appendChild(row);
      return card;
    }

    function downloadIcs(ev) {
      const dtStart = (ev.dateISO || '').replace(/-/g,'') + 'T000000';
      const uid = (ev.id || ev.name || 'event').replace(/\W/g,'-') + '@invite';
      const ics = [
        'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//InviteApp//EN',
        'BEGIN:VEVENT',
        `UID:${uid}`,
        `DTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').split('.')[0]}Z`,
        dtStart && dtStart !== 'T000000' ? `DTSTART:${dtStart}` : '',
        `SUMMARY:${(ev.name || '').replace(/[\r\n]/g,' ')}`,
        ev.venue ? `LOCATION:${[ev.venue, ev.address, ev.city].filter(Boolean).join(', ')}` : '',
        ev.description ? `DESCRIPTION:${ev.description.replace(/[\r\n]/g,' ')}` : '',
        'END:VEVENT','END:VCALENDAR',
      ].filter(Boolean).join('\r\n');
      const blob = new Blob([ics], { type: 'text/calendar' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${(ev.name || 'event').replace(/\W+/g,'-')}.ics`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function setCopy(copy) {
      if (!copy) return;
      document.querySelectorAll('[data-copy-key]').forEach(el => {
        const key = el.getAttribute('data-copy-key');
        if (copy[key]) el.textContent = copy[key];
      });
    }

    // Fire-and-forget view beacon. Uses sendBeacon when available so the
    // request survives the tab closing / navigating away immediately after
    // landing; falls back to fetch for browsers that don't. Silent on
    // failure — telemetry is not allowed to block or error the UI.
    function sendViewBeacon() {
      try {
        const token = getToken();
        const payload = JSON.stringify(token ? { token } : {});
        const url = '/api/track-view';
        if (navigator.sendBeacon) {
          navigator.sendBeacon(url, new Blob([payload], { type: 'application/json' }));
        } else {
          fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload, keepalive: true }).catch(() => {});
        }
      } catch {}
    }

    async function boot() {
      const app = qs('#app');
      const payload = await fetchPayload();
      if (!payload || !payload.ok) {
        app.innerHTML = '';
        app.appendChild(ce('div', { class: 'card not-found' }, [
          ce('h1', { text: (payload && payload.copy && payload.copy.inviteNotFound) || 'Invitation not found' }),
          ce('p', { class: 'muted', text: (payload && payload.error) || '' }),
        ]));
        return;
      }
      // Log one view per page load — server distinguishes personal
      // (matched token) from anonymous (no/unknown token) and only
      // records when features.viewAnalytics is on.
      if (payload.features && payload.features.viewAnalytics) sendViewBeacon();

      applyPreset(payload.theme);
      if (payload.features && payload.features.darkMode) {
        document.documentElement.classList.add('dm-auto');
      }
      setCopy(payload.copy);

      app.innerHTML = '';

      // Hide events outside the guest's segment, for both the events grid
      // and the per-event RSVP picker. Keep the full list on payload.events
      // for callers that still need it; rewrite what we hand to renderers.
      const visibleEvents = applySegmentFilter(payload.events, payload.segments, payload.guest);
      const filteredPayload = Object.assign({}, payload, { events: visibleEvents });

      const hero = pickHeroAsset(payload);
      const heroSurface = (payload.theme && payload.theme.tokens && payload.theme.tokens.heroSurface) || 'translucent';
      const heroSection = renderHero(hero, payload.event.title, payload.event.subtitle, payload.copy, heroSurface, payload.event);
      app.appendChild(heroSection);

      const detailsSection    = renderDetails(payload.event, payload.copy);
      const hostsSection      = renderHosts(payload.hosts, payload.copy);
      const eventsSection     = renderTimeline(visibleEvents, payload.copy, payload.features, payload)
                             || renderEvents(visibleEvents, payload.copy, payload.features, payload);
      const travelSection     = renderTravel(payload.event, payload.copy);
      const faqSection        = renderFaq(payload.event, payload.copy);
      const registriesSection = renderRegistries(payload.event, payload.copy);
      const rsvpSection       = renderRsvpForm(filteredPayload);
      const shareSection      = renderShare(payload.event, payload.copy, payload.features);
      const contactSection    = renderContact(payload.event, payload.copy);

      const parts = [
        hostsSection, detailsSection, eventsSection, travelSection,
        faqSection, registriesSection, rsvpSection, shareSection, contactSection,
      ].filter(Boolean);
      for (const p of parts) app.appendChild(p);

      if (!payload.guestFound && getToken()) {
        const warn = ce('div', { class: 'card muted', text: payload.copy.inviteNotFound || 'Invitation not found.' });
        app.insertBefore(warn, app.firstChild);
      }

      // Section nav — only built from sections we actually rendered.
      mountSectionNav(app, [
        { id: 'welcome',    label: (payload.copy.navWelcome)  || 'Welcome',                     el: heroSection },
        { id: 'hosts',      label: payload.copy.hostsHeader   || 'Hosted By',                   el: hostsSection },
        { id: 'details',    label: payload.copy.detailsHeader || 'Details',                     el: detailsSection },
        { id: 'events',     label: payload.copy.eventsHeader  || 'Events',                      el: eventsSection },
        { id: 'travel',     label: payload.copy.travelHeader  || 'Travel',                      el: travelSection },
        { id: 'faq',        label: payload.copy.faqHeader     || 'FAQ',                         el: faqSection },
        { id: 'registries', label: payload.copy.registriesHeader || 'Gifts',                    el: registriesSection },
        { id: 'rsvp',       label: payload.copy.rsvpHeader    || 'RSVP',                        el: rsvpSection },
        { id: 'share',      label: payload.copy.shareHeader   || 'Share',                       el: shareSection },
        { id: 'contact',    label: payload.copy.contactHeader || 'Questions',                   el: contactSection },
      ]);

      observeReveals(app);
    }

    boot().catch(err => {
      console.error('[invite] boot failed:', err);
      const detail = (err && (err.message || String(err))) || 'Unknown error';
      const app = document.getElementById('app');
      app.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'card not-found';
      const h = document.createElement('p');
      h.textContent = 'Something went wrong.';
      const pre = document.createElement('pre');
      pre.style.cssText = 'text-align:left; white-space:pre-wrap; font-size:.78em; color: var(--fgMuted); margin-top:8px;';
      pre.textContent = detail;
      card.appendChild(h);
      card.appendChild(pre);
      app.appendChild(card);
    });
  })();
  </script>
</body>
</html>
