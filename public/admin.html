<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title data-copy-key="adminTitle">Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='6' y='6' width='52' height='52' rx='12' fill='%23222'/></svg>"/>
  <style id="theme-vars">
    :root {
      --bg:#faf7f2; --surface:#ffffff; --surface2:#f3efe8;
      --fg:#1a1a1a; --fgMuted:#6b6b6b; --fgSubtle:#9a9a9a;
      --accent:#8b6f47; --accentFg:#ffffff;
      --border:rgba(0,0,0,.1);
      --success:#3a8a4a; --warn:#b07a1f; --danger:#b13a3a;
      --fontDisplay: ui-serif, Georgia, 'Times New Roman', serif;
      --fontBody: system-ui, -apple-system, sans-serif;
      --fontMono: ui-monospace, 'SF Mono', Menlo, monospace;
      --trackingTight:-0.01em; --trackingBase:0; --trackingLoose:.08em;
      --radiusSm:8px; --radius:12px; --radiusLg:20px;
      --shadow1: 0 1px 2px rgba(0,0,0,.05);
      --shadow2: 0 8px 24px rgba(0,0,0,.08);
      --maxWidth: 1200px;
      --motionFast: 120ms; --motionBase: 200ms; --motionSlow: 360ms;
    }
    *,*::before,*::after { box-sizing:border-box; }
    html,body { margin:0; padding:0; }
    body {
      background: var(--bg); color: var(--fg); font-family: var(--fontBody);
      min-height:100dvh; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    header {
      border-bottom: 1px solid var(--border); background: var(--surface);
      padding: 14px 20px; display:flex; align-items:center; justify-content:space-between;
      gap:12px; flex-wrap:wrap; position: sticky; top: 0; z-index: 10;
      backdrop-filter: saturate(140%) blur(6px);
    }
    header h1 { margin:0; font-family: var(--fontDisplay); font-size:1.25rem; font-weight:600; letter-spacing: var(--trackingTight); }
    header nav { display:flex; gap:4px; flex-wrap:wrap; }
    header nav button {
      appearance:none; border:1px solid transparent; background:transparent; color: var(--fgMuted);
      padding:.45em .95em; border-radius:999px; cursor:pointer; font: inherit; font-size:.92em;
      transition: color var(--motionFast) ease, background var(--motionFast) ease, border-color var(--motionFast) ease;
    }
    header nav button:hover { color: var(--fg); background: var(--surface2); }
    header nav button.active { background: var(--fg); color: var(--surface); border-color: var(--fg); }
    main { padding: 22px; max-width: var(--maxWidth); margin: 0 auto; }
    .card {
      background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin: 14px 0; box-shadow: var(--shadow1);
    }
    h2 { margin: 0 0 14px; font-family: var(--fontDisplay); font-size: 1.15rem; font-weight:600; letter-spacing: var(--trackingTight); }
    h3 { margin: 0 0 8px; font-family: var(--fontDisplay); font-weight:600; }
    .muted { color: var(--fgMuted); }
    .subtle { color: var(--fgSubtle); }
    .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    input, select, textarea, button { font: inherit; color: var(--fg); }
    input, select, textarea {
      padding: .55em .7em; border:1px solid var(--border); border-radius: var(--radiusSm);
      background: var(--surface); width: 100%;
      transition: border-color var(--motionFast) ease, box-shadow var(--motionFast) ease;
    }
    input:hover, select:hover, textarea:hover { border-color: color-mix(in srgb, var(--fg) 22%, transparent); }
    label.field { display:grid; gap:4px; font-size:.85em; color: var(--fgMuted); letter-spacing: .02em; }
    .btn {
      display:inline-flex; align-items:center; gap:.4em; appearance:none; border:0; cursor:pointer;
      font-weight:600; padding:.6em 1.1em; border-radius: 999px;
      background: var(--fg); color: var(--surface);
      transition: transform var(--motionFast) ease, background var(--motionFast) ease, color var(--motionFast) ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.small { padding:.4em .85em; font-size:.85em; }
    .btn.ghost { background: transparent; color: var(--fg); border:1px solid var(--border); }
    .btn.ghost:hover { background: var(--surface2); }
    .btn.accent { background: var(--accent); color: var(--accentFg); }
    .btn.danger { background: var(--danger); color: #fff; }
    .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    *:focus { outline: none; }
    *:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px;
    }
    table { width:100%; border-collapse: collapse; font-size:.92em; }
    th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align:left; vertical-align: top; }
    th { background: var(--surface2); font-weight:600; font-size:.8em; text-transform: uppercase; letter-spacing: var(--trackingLoose); color: var(--fgMuted); }
    tbody tr { transition: background var(--motionFast) ease; }
    tbody tr:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }
    .chip { display:inline-block; padding:.18em .65em; border-radius:999px; background: var(--surface2); font-size:.78em; color: var(--fgMuted); }
    .stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
    .stat {
      padding: 14px 16px; border:1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); transition: transform var(--motionFast) ease;
    }
    .stat:hover { transform: translateY(-1px); box-shadow: var(--shadow1); }
    .stat .n { font-family: var(--fontDisplay); font-size: 1.7rem; font-weight: 600; letter-spacing: var(--trackingTight); }
    .stat .l { color: var(--fgMuted); font-size:.78em; text-transform: uppercase; letter-spacing: var(--trackingLoose); margin-top: 4px; }
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius); padding: 28px; text-align:center;
      background: var(--surface2); transition: background var(--motionBase) ease, border-color var(--motionBase) ease;
    }
    .upload-zone.drag { background: color-mix(in srgb, var(--accent) 8%, var(--surface)); border-color: var(--accent); }
    .asset-tile { border:1px solid var(--border); border-radius: var(--radius); padding: 12px; background: var(--surface); }
    .asset-tile img, .asset-tile video {
      width:100%; aspect-ratio: 4/3; object-fit: contain;
      background: var(--surface2); border-radius: var(--radiusSm);
    }
    .asset-tile .foot { display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-size:.82em; }
    #pin-overlay {
      position: fixed; inset: 0; background: rgba(10,10,10,.65); backdrop-filter: blur(8px);
      display:flex; align-items:center; justify-content:center; z-index: 100;
    }
    #pin-overlay .box {
      background: var(--surface); padding: 26px; border-radius: var(--radiusLg);
      width: min(92vw, 380px); box-shadow: var(--shadow2);
    }
    .hidden { display:none !important; }
    .err, .form-msg.is-error { color: var(--danger); }
    .form-msg.is-success { color: var(--success); }
    details summary { cursor:pointer; font-weight:600; }

    /* Preset picker chips */
    .preset-grid {
      display:grid; gap:12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .preset-chip {
      appearance:none; cursor:pointer; text-align:left;
      border:1px solid var(--border); border-radius: var(--radius);
      padding: 14px; background: var(--surface);
      transition: transform var(--motionFast) ease, border-color var(--motionFast) ease, box-shadow var(--motionBase) ease;
      display:flex; flex-direction:column; gap:8px;
    }
    .preset-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow2); }
    .preset-chip.active { border-color: var(--fg); box-shadow: 0 0 0 2px var(--fg) inset; }
    .preset-swatch { display:flex; gap:0; height: 44px; border-radius: var(--radiusSm); overflow: hidden; border:1px solid var(--border); }
    .preset-swatch span { flex:1; }
    .preset-chip .label { font-family: var(--fontDisplay); font-weight:600; font-size:1rem; }
    .preset-chip .hint { color: var(--fgMuted); font-size:.82em; line-height: 1.4; }

    /* Save bar */
    .save-bar {
      position: sticky; bottom: 12px;
      background: var(--surface); border:1px solid var(--border); border-radius: var(--radiusLg);
      padding: 14px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px;
      box-shadow: var(--shadow2); margin: 14px 0;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
      .btn:hover, .stat:hover, .preset-chip:hover { transform: none; }
    }
    @media (max-width: 640px) {
      th.mobile-hide, td.mobile-hide { display:none; }
      main { padding: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1 data-copy-key="adminTitle">Admin</h1>
    <nav id="tabs"></nav>
    <div>
      <button id="logout-btn" class="btn small ghost hidden">Log out</button>
    </div>
  </header>

  <main id="main"></main>

  <div id="pin-overlay" class="hidden">
    <div class="box">
      <h2 style="margin-top:0">Enter PIN</h2>
      <form id="pin-form" class="row" style="flex-direction:column; align-items:stretch; gap:10px;">
        <input type="password" id="pin-input" inputmode="numeric" autocomplete="one-time-code" required/>
        <button type="submit" class="btn">Unlock</button>
        <p class="form-msg is-error" id="pin-err" role="alert" aria-live="polite" style="min-height:1.2em; margin:0;"></p>
      </form>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    const STATE = {
      token:    localStorage.getItem('invite-admin-token') || '',
      config:   null,
      features: {},
      copy:     {},
      tab:      null,
      guests:   [],
      assets:   [],
      stats:    null,
      selectedGuestIds: new Set(),
    };

    function ensureFontLink(href) {
      if (!href) return;
      const id = 'preset-font-link';
      let link = document.getElementById(id);
      if (link && link.href === href) return;
      if (!link) {
        link = document.createElement('link');
        link.id = id;
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
      link.href = href;
    }

    function applyPreset(theme) {
      if (!theme || !theme.tokens) return;
      const root = document.documentElement;
      for (const [k, v] of Object.entries(theme.tokens)) {
        if (v != null && v !== '') root.style.setProperty('--' + k, String(v));
      }
      ensureFontLink(theme.fontHref);
    }

    const qs  = (s, r=document) => r.querySelector(s);
    const ce  = (tag, attrs={}, children=[]) => {
      const el = document.createElement(tag);
      for (const [k,v] of Object.entries(attrs)) {
        if (k === 'class') el.className = v;
        else if (k === 'html') el.innerHTML = v;
        else if (k === 'text') el.textContent = v;
        else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
        else if (v !== undefined && v !== null && v !== false) el.setAttribute(k, v);
      }
      for (const c of [].concat(children)) if (c != null) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      return el;
    };

    async function api(path, opts = {}) {
      const headers = Object.assign({}, opts.headers || {});
      if (STATE.token) headers['x-auth-token'] = STATE.token;
      if (opts.body && !(opts.body instanceof FormData) && !headers['Content-Type']) {
        headers['Content-Type'] = 'application/json';
        opts.body = typeof opts.body === 'string' ? opts.body : JSON.stringify(opts.body);
      }
      const r = await fetch(path, Object.assign({}, opts, { headers }));
      if (r.status === 401) { showPinGate(); throw new Error('auth'); }
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      return data;
    }

    function showPinGate() { qs('#pin-overlay').classList.remove('hidden'); }
    function hidePinGate() { qs('#pin-overlay').classList.add('hidden'); qs('#pin-err').textContent = ''; }

    async function validatePin(pin) {
      const r = await fetch('/api/validate-pin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pin }) });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) throw new Error(data.error || 'Wrong PIN');
      STATE.token = data.token;
      localStorage.setItem('invite-admin-token', data.token);
    }

    async function loadBootstrap() {
      const data = await (await fetch('/api/bootstrap')).json();
      STATE.config   = data;
      STATE.features = data.features || {};
      STATE.copy     = data.copy || {};
      document.querySelectorAll('[data-copy-key]').forEach(el => {
        const key = el.getAttribute('data-copy-key');
        if (STATE.copy[key]) el.textContent = STATE.copy[key];
      });
      if (data.theme) applyPreset(data.theme);
      if (!STATE.tab) {
        const first = tabs()[0];
        if (first) STATE.tab = first[0];
      }
    }

    function tabs() {
      const list = [];
      list.push(['settings', STATE.copy.adminTabSettings || 'Settings']);
      if (STATE.features.assetUpload)   list.push(['assets',  STATE.copy.adminTabAssets  || 'Assets']);
      if (STATE.features.guestManager)  list.push(['guests',  STATE.copy.adminTabGuests  || 'Guests']);
      if (STATE.features.bulkMessaging) list.push(['send',    STATE.copy.adminTabSend    || 'Send']);
      if (STATE.features.csvExport || STATE.features.jsonBackup) list.push(['exports', STATE.copy.adminTabExports || 'Exports']);
      return list;
    }

    function renderTabs() {
      const host = qs('#tabs');
      host.innerHTML = '';
      const list = tabs();
      if (list.length && !list.some(([id]) => id === STATE.tab)) STATE.tab = list[0][0];
      for (const [id, label] of list) {
        const btn = ce('button', {
          class: STATE.tab === id ? 'active' : '',
          onclick: () => { STATE.tab = id; renderTabs(); renderBody(); },
        }, [label]);
        host.appendChild(btn);
      }
      qs('#logout-btn').classList.toggle('hidden', !STATE.token);
    }

    async function renderBody() {
      const main = qs('#main');
      main.innerHTML = '';
      if (STATE.tab === 'settings') return renderSettingsTab(main);
      if (STATE.tab === 'assets')  return renderAssetsTab(main);
      if (STATE.tab === 'guests')  return renderGuestsTab(main);
      if (STATE.tab === 'send')    return renderSendTab(main);
      if (STATE.tab === 'exports') return renderExportsTab(main);
    }

    // ─── Assets tab ───────────────────────────────────────────────────────
    async function renderAssetsTab(host) {
      host.appendChild(ce('div', { class: 'card' }, [
        ce('h2', { text: 'Upload' }),
        ce('p', { class: 'muted', text: 'Upload your invite as PDF, JPG, PNG, or MP4. The app uses the asset tagged "hero" as your main invitation.' }),
        buildUploadZone(),
      ]));
      const list = ce('div', { class: 'card' });
      list.appendChild(ce('h2', { text: 'Uploaded Assets' }));
      const grid = ce('div', { class: 'grid' });
      list.appendChild(grid);
      host.appendChild(list);
      await refreshAssets(grid);
    }

    function buildUploadZone() {
      const zone = ce('div', { class: 'upload-zone' });
      const msg = ce('p', { class: 'muted', text: 'Drop a file here, or click to choose.' });
      const input = ce('input', { type: 'file', accept: 'application/pdf,image/jpeg,image/png,image/webp,video/mp4', style: 'display:none' });
      const roleSel = ce('select', {}, (STATE.config.assetRoles || []).map(r => ce('option', { value: r, text: r })));
      const hostInput = ce('input', { type: 'text', placeholder: 'host slug (optional)', style: 'max-width:180px;' });
      const btn = ce('button', { class: 'btn', type: 'button', onclick: () => input.click() }, ['Choose file']);
      const status = ce('p', { class: 'muted' });

      async function doUpload(file) {
        if (!file) return;
        status.textContent = `Uploading ${file.name} ${(file.size/1024/1024).toFixed(1)} MB\u2026`;
        const fd = new FormData();
        fd.append('file', file);
        fd.append('role', roleSel.value || '');
        fd.append('hostSlug', hostInput.value.trim().toLowerCase());
        try {
          const res = await api('/api/assets', { method: 'POST', body: fd });
          status.innerHTML = '';
          status.appendChild(document.createTextNode(`Uploaded "${res.asset.filename}" as "${res.asset.role || 'untagged'}"`));
          renderBody();
        } catch (e) { status.textContent = `Upload failed: ${e.message}`; }
      }

      input.addEventListener('change', () => doUpload(input.files[0]));
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
      zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('drag'); doUpload(e.dataTransfer.files[0]); });

      zone.appendChild(msg);
      const hasHosts = ((STATE.config && STATE.config.hosts) || []).length > 0;
      const fieldRow = [ce('label', { class: 'field' }, ['Role', roleSel])];
      if (hasHosts) fieldRow.push(ce('label', { class: 'field' }, ['Host slug', hostInput]));
      zone.appendChild(ce('div', { class: 'row', style: 'justify-content:center; margin:8px 0;' }, fieldRow));
      zone.appendChild(btn);
      zone.appendChild(input);
      zone.appendChild(status);
      return zone;
    }

    async function refreshAssets(grid) {
      grid.innerHTML = '';
      try {
        const data = await api('/api/assets');
        STATE.assets = data.assets || [];
        if (!STATE.assets.length) {
          grid.appendChild(ce('p', { class: 'muted', text: 'No assets yet. Upload your invite to get started.' }));
          return;
        }
        for (const a of STATE.assets) {
          const tile = ce('div', { class: 'asset-tile' });
          if ((a.mime || '').startsWith('video/')) tile.appendChild(ce('video', { src: a.url, controls: 'controls', playsinline: 'playsinline' }));
          else tile.appendChild(ce('img', { src: a.thumbUrl || a.url, alt: a.filename }));
          tile.appendChild(ce('div', { class: 'muted', style: 'margin-top:6px; word-break:break-all; font-size:.82em;', text: a.filename }));
          tile.appendChild(ce('div', { class: 'foot' }, [
            ce('span', { class: 'chip', text: a.role || 'untagged' }),
            ce('button', { class: 'btn small danger', onclick: async () => {
              if (!confirm(`Delete "${a.filename}"?`)) return;
              await api(`/api/assets/${a.id}`, { method: 'DELETE' });
              refreshAssets(grid);
            }}, ['Delete']),
          ]));
          grid.appendChild(tile);
        }
      } catch (e) { grid.appendChild(ce('p', { class: 'err', text: e.message })); }
    }

    // ─── Guests tab ───────────────────────────────────────────────────────
    async function renderGuestsTab(host) {
      const statCard = ce('div', { class: 'card' });
      statCard.appendChild(ce('h2', { text: 'Overview' }));
      const statGrid = ce('div', { class: 'stats' });
      statCard.appendChild(statGrid);
      host.appendChild(statCard);

      const addCard = ce('div', { class: 'card' });
      addCard.appendChild(ce('h2', { text: 'Add Guest' }));
      const form = ce('form', { class: 'grid' });
      const inputs = {
        guestName:    ce('input', { required: 'required', name: 'guestName' }),
        mobileNumber: ce('input', { name: 'mobileNumber', inputmode: 'tel' }),
        emailAddress: ce('input', { name: 'emailAddress', type: 'email' }),
        guestGroup:   ce('select', { name: 'guestGroup' }, [ce('option', { value: '', text: '(no group)' }), ...(STATE.config.groups || []).map(g => ce('option', { value: g, text: g }))]),
        partySize:    ce('input', { name: 'partySize', type: 'number', min: '1', max: '20', value: '1' }),
        segment:      ce('input', { name: 'segment', placeholder: 'optional segment' }),
        notes:        ce('input', { name: 'notes' }),
      };
      form.appendChild(ce('label', { class: 'field' }, ['Name', inputs.guestName]));
      form.appendChild(ce('label', { class: 'field' }, ['Mobile', inputs.mobileNumber]));
      form.appendChild(ce('label', { class: 'field' }, ['Email', inputs.emailAddress]));
      form.appendChild(ce('label', { class: 'field' }, ['Group', inputs.guestGroup]));
      form.appendChild(ce('label', { class: 'field' }, ['Party size', inputs.partySize]));
      form.appendChild(ce('label', { class: 'field' }, ['Segment', inputs.segment]));
      form.appendChild(ce('label', { class: 'field' }, ['Notes', inputs.notes]));
      const submit = ce('button', { class: 'btn', type: 'submit' }, ['Add Guest']);
      const msg = ce('p', { class: 'muted' });
      form.appendChild(submit);
      form.appendChild(msg);
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submit.disabled = true; msg.textContent = '';
        try {
          const body = Object.fromEntries(Object.entries(inputs).map(([k, el]) => [k, el.value]));
          await api('/api/guests', { method: 'POST', body });
          msg.textContent = `Added ${body.guestName}.`;
          for (const el of Object.values(inputs)) if (el.tagName !== 'SELECT') el.value = '';
          inputs.partySize.value = '1';
          refreshGuests();
          refreshStats();
        } catch (err) { msg.textContent = err.message; }
        submit.disabled = false;
      });
      addCard.appendChild(form);
      host.appendChild(addCard);

      const listCard = ce('div', { class: 'card' });
      listCard.appendChild(ce('h2', { text: 'Guests' }));
      const tableHost = ce('div', { id: 'guest-table-host' });
      listCard.appendChild(tableHost);
      host.appendChild(listCard);

      async function refreshStats() {
        try {
          const s = await api('/api/stats');
          STATE.stats = s;
          statGrid.innerHTML = '';
          [
            ['Guests', s.total], ['Attending', s.attending], ['Pending', s.pending], ['Declined', s.declined],
            ['Seats (est.)', s.totalSeats], ['Seats attending', s.attendingSeats],
            ...(STATE.features.viewAnalytics ? [['Views', s.views], ['Submissions', s.submissions]] : []),
          ].forEach(([l, n]) => statGrid.appendChild(ce('div', { class: 'stat' }, [ce('div', { class: 'n', text: String(n ?? '') }), ce('div', { class: 'l', text: l })])));
        } catch (e) { /* ignore */ }
      }

      async function refreshGuests() {
        try {
          const data = await api('/api/guests');
          STATE.guests = data.rows || [];
          tableHost.innerHTML = '';
          if (!STATE.guests.length) { tableHost.appendChild(ce('p', { class: 'muted', text: 'No guests yet.' })); return; }
          const table = ce('table');
          const thead = ce('thead');
          thead.appendChild(ce('tr', {}, [
            ce('th', { text: '#' }),
            ce('th', { text: 'Name' }),
            ce('th', { class: 'mobile-hide', text: 'Group' }),
            ce('th', { class: 'mobile-hide', text: 'Phone' }),
            ce('th', { text: 'Party' }),
            ce('th', { text: 'RSVP' }),
            ce('th', { text: 'Invite' }),
            ce('th', { text: '' }),
          ]));
          table.appendChild(thead);
          const tbody = ce('tbody');
          for (const g of STATE.guests) {
            const link = `${location.origin}/i/${g.inviteToken}`;
            const rsvpSel = ce('select', {}, ['Pending','Attending','Maybe','Declined'].map(s => ce('option', { value: s, selected: g.rsvp === s ? 'selected' : undefined, text: s })));
            rsvpSel.addEventListener('change', async () => {
              await api(`/api/guests/${g.id}`, { method: 'PUT', body: { field: 'rsvp', value: rsvpSel.value } });
              refreshStats();
            });
            const invSel = ce('select', {}, ['Not Sent','Sent','Delivered','Not Invited'].map(s => ce('option', { value: s, selected: g.inviteStatus === s ? 'selected' : undefined, text: s })));
            invSel.addEventListener('change', async () => {
              await api(`/api/guests/${g.id}`, { method: 'PUT', body: { field: 'inviteStatus', value: invSel.value } });
              refreshStats();
            });
            const copyBtn = ce('button', { class: 'btn small ghost', onclick: () => navigator.clipboard.writeText(link).then(() => copyBtn.textContent = 'Copied') }, ['Copy link']);
            const waBtn = g.mobileNumber ? ce('a', { class: 'btn small ghost', href: waUrl(g, link), target: '_blank', rel: 'noopener', text: 'WhatsApp' }) : null;
            const delBtn = ce('button', { class: 'btn small danger', onclick: async () => {
              if (!confirm(`Delete ${g.guestName}?`)) return;
              await api(`/api/guests/${g.id}`, { method: 'DELETE' });
              refreshGuests(); refreshStats();
            }}, ['Delete']);
            tbody.appendChild(ce('tr', {}, [
              ce('td', { text: String(g.id) }),
              ce('td', {}, [g.guestName, ce('br'), ce('span', { class: 'muted', style:'font-size:.85em', text: g.emailAddress || '' })]),
              ce('td', { class: 'mobile-hide', text: g.guestGroup || '' }),
              ce('td', { class: 'mobile-hide', text: g.mobileNumber || '' }),
              ce('td', { text: `${g.partySize || 1}${g.confirmedPartySize != null ? ` → ${g.confirmedPartySize}` : ''}` }),
              ce('td', {}, [rsvpSel]),
              ce('td', {}, [invSel]),
              ce('td', {}, [ce('div', { class: 'row' }, [copyBtn, waBtn, delBtn].filter(Boolean))]),
            ]));
          }
          table.appendChild(tbody);
          tableHost.appendChild(table);
        } catch (e) { tableHost.appendChild(ce('p', { class: 'err', text: e.message })); }
      }

      refreshStats();
      refreshGuests();
    }

    function waUrl(g, inviteUrl) {
      const tpl = (STATE.config.messaging && STATE.config.messaging.inviteTemplate) || 'Hi {{name}}, {{inviteUrl}}';
      const event = STATE.config.event || {};
      const vars = {
        name: g.guestName || '',
        eventTitle: event.title || '',
        eventDate: event.dateLabel ? ` on ${event.dateLabel}` : '',
        inviteUrl,
        rsvpDeadline: event.rsvpDeadline || '',
      };
      const msg = tpl.replace(/\{\{(\w+)\}\}/g, (_, k) => vars[k] ?? '');
      const phone = (g.mobileNumber || '').replace(/[^0-9]/g, '');
      return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    }

    // ─── Send tab ──────────────────────────────────────────────────────────
    async function renderSendTab(host) {
      const card = ce('div', { class: 'card' });
      card.appendChild(ce('h2', { text: 'Bulk WhatsApp Send' }));
      card.appendChild(ce('p', { class: 'muted', text: 'Step through each guest and open a pre-filled WhatsApp message. After sending, mark the guest "Sent" and move on.' }));
      const list = ce('div', { id: 'send-list' });
      card.appendChild(list);
      host.appendChild(card);

      try {
        const data = await api('/api/guests');
        const guests = (data.rows || []).filter(g => g.mobileNumber);
        if (!guests.length) { list.appendChild(ce('p', { class: 'muted', text: 'No guests with phone numbers yet.' })); return; }
        const state = { idx: 0 };
        const cursor = ce('div');
        const nav = ce('div', { class: 'row', style: 'margin-top:12px' });
        list.appendChild(cursor);
        list.appendChild(nav);
        const paint = () => {
          const g = guests[state.idx];
          cursor.innerHTML = '';
          if (!g) { cursor.appendChild(ce('p', { text: 'All done.' })); nav.innerHTML = ''; return; }
          const link = `${location.origin}/i/${g.inviteToken}`;
          const wa = waUrl(g, link);
          cursor.appendChild(ce('div', { class: 'card' }, [
            ce('div', { class: 'muted', text: `Guest ${state.idx + 1} of ${guests.length}` }),
            ce('h3', { text: g.guestName }),
            ce('p', { class: 'muted', text: `${g.mobileNumber} \u00b7 ${g.guestGroup || 'No group'} \u00b7 ${g.inviteStatus}` }),
            ce('div', { class: 'row' }, [
              ce('a', { class: 'btn', href: wa, target: '_blank', rel: 'noopener', text: 'Open WhatsApp' }),
              ce('button', { class: 'btn ghost', onclick: async () => {
                await api(`/api/guests/${g.id}`, { method: 'PUT', body: { field: 'inviteStatus', value: 'Sent' } });
                state.idx += 1; paint();
              }}, ['Sent → Next']),
              ce('button', { class: 'btn ghost', onclick: () => { state.idx += 1; paint(); }}, ['Skip']),
            ]),
          ]));
        };
        paint();
      } catch (e) { list.appendChild(ce('p', { class: 'err', text: e.message })); }
    }

    // ─── Exports tab ───────────────────────────────────────────────────────
    // ─── Settings tab ─────────────────────────────────────────────────────
    async function renderSettingsTab(host) {
      const loading = ce('p', { class: 'muted', text: 'Loading settings…' });
      host.appendChild(loading);
      let cfg;
      try {
        const r = await api('/api/config');
        cfg = r.config || {};
      } catch (e) {
        loading.textContent = 'Failed to load settings: ' + e.message;
        return;
      }
      host.removeChild(loading);

      const draft = JSON.parse(JSON.stringify(cfg));
      draft.event  ||= {};
      draft.events ||= [];
      draft.hosts  ||= [];
      draft.copy   ||= {};
      draft.features ||= {};
      draft.theme  ||= {};
      if (!draft.themePresetActive) draft.themePresetActive = (STATE.config.theme && STATE.config.theme.active) || '';

      const status = ce('p', { class: 'form-msg muted', style: 'min-height:1.2em; margin:0;' });

      function field(label, value, onInput, opts = {}) {
        const input = ce(opts.type === 'textarea' ? 'textarea' : 'input', {
          value: value ?? '', placeholder: opts.placeholder || '',
          type: opts.type === 'textarea' ? undefined : (opts.type || 'text'),
          rows: opts.type === 'textarea' ? 3 : undefined,
        });
        if (value != null) input.value = value;
        input.addEventListener('input', () => onInput(input.value));
        return ce('label', { class: 'field' }, [label, input]);
      }

      function checkbox(label, value, onChange) {
        const input = ce('input', { type: 'checkbox' });
        input.checked = Boolean(value);
        input.addEventListener('change', () => onChange(input.checked));
        return ce('label', { class: 'field', style: 'flex-direction:row; align-items:center; gap:8px;' }, [input, label]);
      }

      // ── Event identity ────────────────────────────────────────────────
      const identity = ce('div', { class: 'card' }, [ce('h2', { text: 'Event identity' })]);
      const idGrid = ce('div', { class: 'grid' });
      const EV_FIELDS = [
        ['title', 'Event title', 'e.g. Priya & Rahul'],
        ['subtitle', 'Subtitle / tagline', 'e.g. are getting married'],
        ['hostedBy', 'Hosted by (display)', 'e.g. The Vangam & Rao families'],
        ['dateLabel', 'Date (display)', 'e.g. Saturday, Sept 14 2024'],
        ['dateISO', 'Date (ISO, for calendar)', '2024-09-14'],
        ['timeLabel', 'Time (display)', 'e.g. 4:00 PM onwards'],
        ['venue', 'Venue', 'e.g. Taj Krishna'],
        ['address', 'Address', 'e.g. Road No. 1, Banjara Hills'],
        ['city', 'City', 'e.g. Hyderabad'],
        ['mapsUrl', 'Google Maps URL', 'https://maps.google.com/...'],
        ['rsvpDeadline', 'RSVP deadline (display)', 'e.g. by Aug 30'],
        ['dressCode', 'Dress code', 'e.g. Traditional Indian'],
        ['giftRegistry', 'Gift registry URL', 'https://...'],
        ['contactEmail', 'Contact email', 'you@example.com'],
        ['contactPhone', 'Contact phone', '+91 ...'],
      ];
      for (const [key, label, placeholder] of EV_FIELDS) {
        idGrid.appendChild(field(label, draft.event[key], (v) => { draft.event[key] = v; }, { placeholder }));
      }
      identity.appendChild(idGrid);

      // ── Hero copy ─────────────────────────────────────────────────────
      const copyCard = ce('div', { class: 'card' }, [ce('h2', { text: 'Public invite copy' })]);
      const copyGrid = ce('div', { class: 'grid' });
      const COPY_FIELDS = [
        ['inviteHeaderCta', 'Hero kicker', 'You\u2019re Invited'],
        ['heroFallback', 'Hero subtitle', 'We can\u2019t wait to celebrate with you.'],
        ['detailsHeader', 'Details section header', 'Details'],
        ['eventsHeader', 'Events section header', 'Events'],
        ['hostsHeader', 'Hosts section header', 'Hosted By'],
        ['rsvpHeader', 'RSVP section header', 'RSVP'],
        ['rsvpButton', 'RSVP submit button', 'Send RSVP'],
        ['rsvpSubmitted', 'RSVP success message', 'Your response has been recorded.'],
        ['contactHeader', 'Contact section header', 'Questions?'],
      ];
      for (const [key, label, placeholder] of COPY_FIELDS) {
        copyGrid.appendChild(field(label, draft.copy[key], (v) => { draft.copy[key] = v; }, { placeholder }));
      }
      copyCard.appendChild(copyGrid);

      // ── Features ──────────────────────────────────────────────────────
      const featCard = ce('div', { class: 'card' }, [ce('h2', { text: 'Features' }),
        ce('p', { class: 'muted', text: 'Turn sections on / off. Disabled sections disappear from the public page.' })]);
      const featGrid = ce('div', { class: 'grid' });
      const FEAT_FIELDS = [
        ['publicRsvp', 'RSVP form'],
        ['calendarExport', 'Add-to-calendar button'],
        ['bulkMessaging', 'Bulk messaging tab'],
        ['guestManager', 'Guest manager tab'],
        ['videoUpload', 'Allow video uploads'],
        ['darkMode', 'Dark mode toggle'],
      ];
      for (const [key, label] of FEAT_FIELDS) {
        featGrid.appendChild(checkbox(label, draft.features[key], (v) => { draft.features[key] = v; }));
      }
      featCard.appendChild(featGrid);

      // ── Theme: visual preset picker ──────────────────────────────────
      const themeCard = ce('div', { class: 'card' }, [
        ce('h2', { text: 'Theme' }),
        ce('p', { class: 'muted', style: 'margin-top:0', text: 'Pick a preset. Click any chip to preview live; the change is saved when you click Save.' }),
      ]);
      const presetGrid = ce('div', { class: 'preset-grid' });
      const presets = cfg.themePresetsFull || cfg.themePresets || [];

      function renderPresetChips() {
        presetGrid.innerHTML = '';
        for (const p of presets) {
          const swatch = ce('div', { class: 'preset-swatch' });
          const colors = (p.swatch && p.swatch.length ? p.swatch : ['#eee','#888','#222']);
          for (const c of colors) {
            const sw = ce('span'); sw.style.background = c; swatch.appendChild(sw);
          }
          const chip = ce('button', {
            type: 'button',
            class: 'preset-chip' + (draft.themePresetActive === p.id ? ' active' : ''),
            onclick: () => {
              draft.themePresetActive = p.id;
              renderPresetChips();
              if (p.tokens) applyPreset({ tokens: p.tokens, fontHref: p.fontHref || '' });
            },
          });
          chip.appendChild(swatch);
          chip.appendChild(ce('div', { class: 'label', text: p.label || p.id }));
          if (p.hint) chip.appendChild(ce('div', { class: 'hint', text: p.hint }));
          presetGrid.appendChild(chip);
        }
        if (!presets.length) {
          presetGrid.appendChild(ce('p', { class: 'muted', text: 'No presets configured.' }));
        }
      }
      renderPresetChips();
      themeCard.appendChild(presetGrid);

      // Optional advanced overlay (color overrides)
      const advanced = ce('details', { style: 'margin-top: 14px;' });
      advanced.appendChild(ce('summary', { text: 'Advanced color overrides' }));
      const themeGrid = ce('div', { class: 'grid', style: 'margin-top:10px' });
      const THEME_FIELDS = [
        ['bg', 'Background'], ['fg', 'Text'], ['accent', 'Accent'], ['fgMuted', 'Muted text'],
      ];
      for (const [key, label] of THEME_FIELDS) {
        themeGrid.appendChild(field(label, draft.theme[key], (v) => { draft.theme[key] = v; }, { placeholder: 'leave blank to use preset' }));
      }
      advanced.appendChild(themeGrid);
      themeCard.appendChild(advanced);

      // ── Hosts repeater ────────────────────────────────────────────────
      const hostsCard = ce('div', { class: 'card' }, [ce('h2', { text: 'Hosts / sides' }),
        ce('p', { class: 'muted', text: 'Leave empty to hide the "Hosted By" strip.' })]);
      const hostsList = ce('div');
      function renderHosts() {
        hostsList.innerHTML = '';
        draft.hosts.forEach((h, i) => {
          const row = ce('div', { class: 'card', style: 'background: var(--surface2)' });
          const grid = ce('div', { class: 'grid' });
          grid.appendChild(field('Display label', h.label, (v) => { h.label = v; }, { placeholder: 'e.g. Vangam Family' }));
          grid.appendChild(field('Slug (a-z)', h.slug, (v) => { h.slug = v.toLowerCase().replace(/[^a-z0-9-]/g, '-'); }, { placeholder: 'e.g. vangam' }));
          grid.appendChild(field('Role (optional)', h.role, (v) => { h.role = v; }, { placeholder: 'e.g. Parents of the bride' }));
          row.appendChild(grid);
          row.appendChild(ce('button', { class: 'btn small danger', onclick: () => { draft.hosts.splice(i, 1); renderHosts(); } }, ['Remove']));
          hostsList.appendChild(row);
        });
      }
      renderHosts();
      hostsCard.appendChild(hostsList);
      hostsCard.appendChild(ce('button', { class: 'btn small ghost', onclick: () => {
        draft.hosts.push({ id: 'h' + Date.now(), label: '', slug: '', role: '' }); renderHosts();
      }}, ['+ Add host']));

      // ── Sub-events repeater ───────────────────────────────────────────
      const eventsCard = ce('div', { class: 'card' }, [ce('h2', { text: 'Sub-events' }),
        ce('p', { class: 'muted', text: 'Add ceremonies, receptions, etc. Leave empty for a single-event invite.' })]);
      const evList = ce('div');
      function renderEvents() {
        evList.innerHTML = '';
        draft.events.forEach((ev, i) => {
          const row = ce('div', { class: 'card', style: 'background: var(--surface2)' });
          const grid = ce('div', { class: 'grid' });
          grid.appendChild(field('Name', ev.name, (v) => { ev.name = v; }, { placeholder: 'e.g. Mehendi' }));
          grid.appendChild(field('Date (display)', ev.dateLabel, (v) => { ev.dateLabel = v; }, { placeholder: 'Fri, Sept 13' }));
          grid.appendChild(field('Date (ISO)', ev.dateISO, (v) => { ev.dateISO = v; }, { placeholder: '2024-09-13' }));
          grid.appendChild(field('Time (display)', ev.timeLabel, (v) => { ev.timeLabel = v; }, { placeholder: '5:00 PM' }));
          grid.appendChild(field('Venue', ev.venue, (v) => { ev.venue = v; }));
          grid.appendChild(field('Address', ev.address, (v) => { ev.address = v; }));
          grid.appendChild(field('Maps URL', ev.mapsUrl, (v) => { ev.mapsUrl = v; }));
          grid.appendChild(field('Dress code', ev.dressCode, (v) => { ev.dressCode = v; }));
          row.appendChild(grid);
          row.appendChild(field('Description', ev.description, (v) => { ev.description = v; }, { type: 'textarea' }));
          row.appendChild(ce('button', { class: 'btn small danger', onclick: () => { draft.events.splice(i, 1); renderEvents(); } }, ['Remove']));
          evList.appendChild(row);
        });
      }
      renderEvents();
      eventsCard.appendChild(evList);
      eventsCard.appendChild(ce('button', { class: 'btn small ghost', onclick: () => {
        draft.events.push({ id: 'e' + Date.now(), name: '', dateLabel: '', dateISO: '', timeLabel: '', venue: '', address: '', mapsUrl: '', description: '', dressCode: '' });
        renderEvents();
      }}, ['+ Add sub-event']));

      // ── Save bar ──────────────────────────────────────────────────────
      const saveBar = ce('div', { class: 'save-bar' });
      const saveBtn = ce('button', { class: 'btn' }, ['Save changes']);
      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true;
        status.className = 'form-msg muted';
        status.textContent = 'Saving…';
        try {
          await api('/api/config', { method: 'PUT', body: { config: {
            event: draft.event, events: draft.events, hosts: draft.hosts,
            copy: draft.copy, features: draft.features, theme: draft.theme,
            themePresetActive: draft.themePresetActive,
          } } });
          await loadBootstrap();
          renderTabs();
          status.className = 'form-msg is-success';
          status.textContent = 'Saved. The invite page now reflects your changes.';
        } catch (e) {
          status.className = 'form-msg is-error';
          status.textContent = 'Save failed: ' + e.message;
        } finally {
          saveBtn.disabled = false;
        }
      });
      const previewLink = ce('a', { class: 'btn ghost', href: '/invite.html', target: '_blank' }, ['Preview invite ↗']);
      saveBar.appendChild(status);
      saveBar.appendChild(ce('div', { class: 'row' }, [previewLink, saveBtn]));

      host.appendChild(themeCard);
      host.appendChild(identity);
      host.appendChild(copyCard);
      host.appendChild(hostsCard);
      host.appendChild(eventsCard);
      host.appendChild(featCard);
      host.appendChild(saveBar);
    }

    function renderExportsTab(host) {
      const card = ce('div', { class: 'card' });
      card.appendChild(ce('h2', { text: 'Exports & Backup' }));
      const row = ce('div', { class: 'row' });
      if (STATE.features.csvExport) row.appendChild(ce('a', { class: 'btn ghost', href: `/api/export.csv?token=${encodeURIComponent(STATE.token)}`, text: 'Export CSV' }));
      if (STATE.features.jsonBackup) row.appendChild(ce('a', { class: 'btn ghost', href: `/api/export.json?token=${encodeURIComponent(STATE.token)}`, text: 'Download JSON backup' }));

      const restoreInput = ce('input', { type: 'file', accept: 'application/json', style: 'display:none' });
      const restoreBtn = ce('button', { class: 'btn ghost', onclick: () => restoreInput.click() }, ['Restore from JSON']);
      const wipeChk = ce('input', { type: 'checkbox' });
      const wipeLbl = ce('label', { class: 'field', style: 'flex-direction:row; align-items:center; gap:6px;' }, [wipeChk, ' Wipe existing guests first']);
      const status = ce('p', { class: 'muted' });
      restoreInput.addEventListener('change', async () => {
        const file = restoreInput.files[0];
        if (!file) return;
        if (wipeChk.checked && !confirm('This will permanently delete all existing guests before importing. Continue?')) {
          restoreInput.value = '';
          return;
        }
        status.className = 'form-msg muted';
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          const guests = parsed.guests || [];
          const res = await api('/api/import.json', { method: 'POST', body: { guests, wipeFirst: wipeChk.checked } });
          status.className = 'form-msg is-success';
          status.textContent = `Imported ${res.imported} guests.`;
        } catch (e) {
          status.className = 'form-msg is-error';
          status.textContent = `Restore failed: ${e.message}`;
        }
      });
      if (STATE.features.jsonBackup) row.appendChild(restoreBtn);
      card.appendChild(row);
      if (STATE.features.jsonBackup) { card.appendChild(wipeLbl); card.appendChild(restoreInput); card.appendChild(status); }

      host.appendChild(card);
    }

    // ─── Boot ─────────────────────────────────────────────────────────────
    async function boot() {
      await loadBootstrap();
      if (STATE.config.requiresPin && !STATE.token) { showPinGate(); return; }
      renderTabs();
      renderBody();
      hidePinGate();
    }

    qs('#pin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pin = qs('#pin-input').value;
      try {
        await validatePin(pin);
        hidePinGate();
        renderTabs();
        renderBody();
      } catch (err) { qs('#pin-err').textContent = err.message; }
    });

    qs('#logout-btn').addEventListener('click', async () => {
      try { await api('/api/logout', { method: 'POST' }); } catch {}
      localStorage.removeItem('invite-admin-token');
      STATE.token = '';
      showPinGate();
    });

    boot().catch(err => {
      console.error('[admin] boot failed:', err);
      qs('#main').innerHTML = '';
      qs('#main').appendChild(ce('p', { class: 'err', text: err.message || String(err) }));
    });
  })();
  </script>
</body>
</html>
