      // ── Save bar ──────────────────────────────────────────────────────
      // Snapshot serialisation — compared against current draft to detect
      // unsaved edits. Keep in sync with the PUT payload below.
      function snapshot(d) {
        return JSON.stringify({
          event: d.event, events: d.events, hosts: d.hosts, copy: d.copy,
          features: d.features, theme: d.theme, rsvp: d.rsvp,
          messaging: d.messaging, guestSegments: d.guestSegments,
          themePresetActive: d.themePresetActive,
        });
      }
      let baseline = snapshot(draft);
      const saveBar = ce('div', { class: 'save-bar' });
      const meta = ce('div', { class: 'meta', text: 'All changes saved' });
      const saveBtn = ce('button', { class: 'btn', disabled: 'disabled' }, ['Save changes']);
      let dirtyTick = null;
      function recomputeDirty() {
        const dirty = snapshot(draft) !== baseline;
        saveBar.classList.toggle('is-dirty', dirty);
        meta.textContent = dirty ? 'Unsaved changes' : 'All changes saved';
        if (dirty) saveBtn.removeAttribute('disabled'); else saveBtn.setAttribute('disabled', 'disabled');
      }
      function scheduleDirty() {
        if (dirtyTick) return;
        dirtyTick = setTimeout(() => { dirtyTick = null; recomputeDirty(); }, 120);
      }
      // Any input/click inside the settings host marks draft potentially
      // dirty — we debounce re-serialisation to avoid churn.
      host.addEventListener('input', scheduleDirty, true);
      host.addEventListener('click', scheduleDirty, true);
      host.addEventListener('change', scheduleDirty, true);
      // beforeunload guard — only warn while there are unsaved changes.
      const beforeUnload = (e) => {
        if (snapshot(draft) !== baseline) { e.preventDefault(); e.returnValue = ''; }
      };
      window.addEventListener('beforeunload', beforeUnload);

      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true;
        meta.textContent = 'Saving…';
        // Drop empty status options + segments without ID before saving.
        draft.rsvp.statusOptions = (draft.rsvp.statusOptions || []).map(s => String(s || '').trim()).filter(Boolean);
        if (!draft.rsvp.statusOptions.length) draft.rsvp.statusOptions = ['Attending', 'Maybe', 'Declined'];
        draft.guestSegments = (draft.guestSegments || []).filter(s => s && s.id);
        // Prune empty FAQ / registry rows so the public invite stays tidy.
        draft.event.registries = (draft.event.registries || []).filter(r => r && r.url);
        draft.event.faq        = (draft.event.faq || []).filter(it => it && (it.q || it.a));
        try {
          await api('/api/config', { method: 'PUT', body: { config: {
            event: draft.event, events: draft.events, hosts: draft.hosts,
            copy: draft.copy, features: draft.features, theme: draft.theme,
            rsvp: draft.rsvp, messaging: draft.messaging,
            guestSegments: draft.guestSegments,
            themePresetActive: draft.themePresetActive,
          } } });
          await loadBootstrap();
          // Reset baseline so dirty-state resets to clean — do this BEFORE
          // renderTabs() because renderTabs will rebuild the whole tab and
          // this closure becomes dead.
          baseline = snapshot(draft);
          window.removeEventListener('beforeunload', beforeUnload);
          renderTabs();
          toast('Settings saved. Invite page is live.', 'success');
        } catch (e) {
          toast('Save failed: ' + e.message, 'error', 6000);
          recomputeDirty();
        } finally {
          saveBtn.disabled = snapshot(draft) === baseline;
        }
      });
      const previewLink = ce('a', { class: 'btn ghost', href: '/invite.html', target: '_blank' }, ['Preview invite ↗']);
      saveBar.appendChild(meta);
      saveBar.appendChild(ce('div', { class: 'row' }, [previewLink, saveBtn]));

      // Two-column layout: editor on the left, live invite preview on the right.
      // The preview pane can be toggled; its state persists in localStorage so
      // admins who like the side-by-side view don't need to re-enable it.
      const PREVIEW_KEY = 'invite-admin:previewOn';
      const VIEWPORT_KEY = 'invite-admin:previewViewport';
      const split = ce('div', { class: 'settings-split' });
      const left = ce('div', { class: 'settings-left' });

      // Setup quick-actions card — lets admins re-run the onboarding wizard
      // on demand. Always visible; useful for handoffs ("walk me through setup
      // again") and as a safety net if the wizard was dismissed prematurely.
      const setupCard = ce('div', { class: 'card' });
      setupCard.appendChild(ce('h2', { text: 'Setup' }));
      setupCard.appendChild(ce('p', { class: 'muted', text: 'Re-run the guided setup wizard any time. It picks up where you left off and never overwrites values you\u2019ve already customised.' }));
      const runWizardBtn = ce('button', { class: 'btn ghost', type: 'button' }, ['Run setup wizard']);
      runWizardBtn.addEventListener('click', () => {
        localStorage.removeItem(WIZARD_DONE_KEY);
        runOnboardingWizard();
      });
      setupCard.appendChild(runWizardBtn);
      left.appendChild(setupCard);

      left.appendChild(themeCard);
      left.appendChild(identity);
      left.appendChild(travelCard);
      left.appendChild(regCard);
      left.appendChild(faqCard);
      left.appendChild(copyCard);
      left.appendChild(hostsCard);
      left.appendChild(eventsCard);
      left.appendChild(rsvpCard);
      left.appendChild(msgCard);
      left.appendChild(segCard);
      left.appendChild(featCard);
      left.appendChild(saveBar);
      split.appendChild(left);

      let previewFrame = null;
      let previewWrap  = null;
      let previewOn = localStorage.getItem(PREVIEW_KEY) === '1';
      let viewport = localStorage.getItem(VIEWPORT_KEY) || 'desktop';
      const previewAside = ce('aside', { class: 'settings-preview', style: previewOn ? '' : 'display:none' });
      const previewHead = ce('div', { class: 'row', style: 'justify-content:space-between; align-items:center; gap:8px;' });
      previewHead.appendChild(ce('h3', { text: 'Live preview' }));
      const reloadBtn = ce('button', { class: 'btn small ghost', onclick: () => reloadPreview() }, ['Reload']);
      previewHead.appendChild(reloadBtn);
      previewAside.appendChild(previewHead);

      const vpSwitch = ce('div', { class: 'viewport-switch' });
      for (const v of ['desktop', 'tablet', 'mobile']) {
        const btn = ce('button', { type: 'button', 'data-vp': v, text: v[0].toUpperCase() + v.slice(1) });
        if (v === viewport) btn.classList.add('active');
        btn.addEventListener('click', () => {
          viewport = v;
          localStorage.setItem(VIEWPORT_KEY, v);
          vpSwitch.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.vp === v));
          previewWrap.className = `frame-wrap vp-${v}`;
        });
        vpSwitch.appendChild(btn);
      }
      previewAside.appendChild(vpSwitch);

      previewWrap = ce('div', { class: `frame-wrap vp-${viewport}` });
      previewFrame = ce('iframe', { src: '/invite.html', title: 'Invite preview' });
      previewWrap.appendChild(previewFrame);
      previewAside.appendChild(previewWrap);
      split.appendChild(previewAside);

      function reloadPreview() {
        if (!previewFrame) return;
        // Force a fresh fetch — cache-bust so the bootstrap payload is re-read.
        previewFrame.src = '/invite.html?_=' + Date.now();
      }

      // Preview-toggle button lives in the save bar, next to the external link.
      const togglePreviewBtn = ce('button', {
        type: 'button',
        class: 'btn small ghost',
      }, [previewOn ? 'Hide preview' : 'Show preview']);
      togglePreviewBtn.addEventListener('click', () => {
        previewOn = !previewOn;
        localStorage.setItem(PREVIEW_KEY, previewOn ? '1' : '0');
        previewAside.style.display = previewOn ? '' : 'none';
        split.classList.toggle('with-preview', previewOn);
        togglePreviewBtn.textContent = previewOn ? 'Hide preview' : 'Show preview';
        if (previewOn) reloadPreview();
      });
      // Insert the toggle before the external-link / save button pair.
      saveBar.querySelector('.row').prepend(togglePreviewBtn);
      if (previewOn) split.classList.add('with-preview');

      // Successful saves call renderTabs(), which rebuilds this tab and
      // recreates the iframe — no explicit reload hook needed here.

      host.appendChild(split);
    }

    function renderExportsTab(host) {
      const card = ce('div', { class: 'card' });
      card.appendChild(ce('h2', { text: 'Exports & Backup' }));
      const row = ce('div', { class: 'row' });
      if (STATE.features.csvExport) row.appendChild(ce('a', { class: 'btn ghost', href: `/api/export.csv?token=${encodeURIComponent(STATE.token)}`, text: 'Export CSV' }));
      if (STATE.features.jsonBackup) row.appendChild(ce('a', { class: 'btn ghost', href: `/api/export.json?token=${encodeURIComponent(STATE.token)}`, text: 'Download JSON backup' }));

      const restoreInput = ce('input', { type: 'file', accept: 'application/json', style: 'display:none' });
      const restoreBtn = ce('button', { class: 'btn ghost', onclick: () => restoreInput.click() }, ['Restore from JSON']);
      const wipeChk = ce('input', { type: 'checkbox' });
      const wipeLbl = ce('label', { class: 'field', style: 'flex-direction:row; align-items:center; gap:6px;' }, [wipeChk, ' Wipe existing guests first']);
      restoreInput.addEventListener('change', async () => {
        const file = restoreInput.files[0];
        if (!file) return;
        if (wipeChk.checked && !confirm('This will permanently delete all existing guests before importing. Continue?')) {
          restoreInput.value = '';
          return;
        }
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          const guests = parsed.guests || [];
          const res = await api('/api/import.json', { method: 'POST', body: { guests, wipeFirst: wipeChk.checked } });
          toast(`Imported ${res.imported} guests.`, 'success');
        } catch (e) {
          toast(`Restore failed: ${e.message}`, 'error', 6000);
        } finally {
          restoreInput.value = '';
        }
      });
      if (STATE.features.jsonBackup) row.appendChild(restoreBtn);
      card.appendChild(row);
      if (STATE.features.jsonBackup) { card.appendChild(wipeLbl); card.appendChild(restoreInput); }

      host.appendChild(card);

      // CSV import card — lives next to JSON restore for symmetry. Preview
      // step shows inferred column mapping with per-field overrides before
      // committing, so admins can fix weird column names without editing
      // the CSV file.
      if (STATE.features.jsonBackup) {
        const csvCard = ce('div', { class: 'card' });
        csvCard.appendChild(ce('h2', { text: 'Import from CSV' }));
        csvCard.appendChild(ce('p', { class: 'muted', text: 'Upload a CSV exported from your spreadsheet. We map common column names (Name / Email / Phone / Group / Party Size / Notes) automatically; you can override any mapping before committing.' }));
        const csvInput = ce('input', { type: 'file', accept: '.csv,text/csv', style: 'display:none' });
        const csvBtn = ce('button', { class: 'btn ghost', type: 'button', onclick: () => csvInput.click() }, ['Choose CSV file']);
        const csvWipeChk = ce('input', { type: 'checkbox' });
        const csvWipeLbl = ce('label', { class: 'field', style: 'flex-direction:row; align-items:center; gap:6px;' }, [csvWipeChk, ' Wipe existing guests first']);
        const csvPreviewHost = ce('div');
        csvCard.appendChild(ce('div', { class: 'row' }, [csvBtn]));
        csvCard.appendChild(csvWipeLbl);
        csvCard.appendChild(csvInput);
        csvCard.appendChild(csvPreviewHost);

        // Canonical fields the CSV is projected into. Order controls the
        // order of the mapping editor rows.
        const FIELDS = [
          ['guestName', 'Name'], ['mobileNumber', 'Mobile'], ['emailAddress', 'Email'],
          ['guestGroup', 'Group'], ['partySize', 'Party size'], ['segment', 'Segment'],
          ['rsvp', 'RSVP'], ['inviteStatus', 'Invite status'], ['notes', 'Notes'],
        ];

        csvInput.addEventListener('change', async () => {
          const file = csvInput.files[0];
          if (!file) return;
          let text;
          try { text = await file.text(); }
          catch (e) { toast('Could not read file: ' + e.message, 'error'); csvInput.value = ''; return; }
          await previewCsv(text);
        });

        async function previewCsv(csvText) {
          csvPreviewHost.innerHTML = '';
          try {
            const r = await api('/api/import.csv', { method: 'POST', body: { csv: csvText, preview: true } });
            renderPreview(csvText, r);
          } catch (e) {
            toast('Preview failed: ' + e.message, 'error', 6000);
          }
        }

        function renderPreview(csvText, r) {
          csvPreviewHost.innerHTML = '';
          let mapping = { ...r.mapping };
          let sample = r.sample;
          const totalRows = r.totalRows;

          csvPreviewHost.appendChild(ce('h3', { text: `Preview — ${totalRows} rows detected`, style: 'margin-top:16px' }));
          const mapHost = ce('div', { class: 'grid', style: 'margin: 8px 0 12px;' });

          let refreshTimer = null;
          function scheduleRefresh() {
            clearTimeout(refreshTimer);
            refreshTimer = setTimeout(async () => {
              try {
                const fresh = await api('/api/import.csv', { method: 'POST', body: { csv: csvText, preview: true, mapping } });
                sample = fresh.sample;
                renderSample();
              } catch { /* keep old sample; user will see stale until next edit */ }
            }, 180);
          }

          for (const [field, label] of FIELDS) {
            const sel = ce('select', {}, [
              ce('option', { value: '', text: '(unmapped)' }),
              ...r.headers.map(h => ce('option', { value: h, selected: mapping[field] === h ? 'selected' : undefined, text: h })),
            ]);
            sel.addEventListener('change', () => {
              if (sel.value) mapping[field] = sel.value;
              else delete mapping[field];
              scheduleRefresh();
            });
            mapHost.appendChild(ce('label', { class: 'field' }, [label, sel]));
          }
          csvPreviewHost.appendChild(mapHost);

          const sampleHost = ce('div', { style: 'overflow-x:auto; margin-bottom: 12px;' });
          csvPreviewHost.appendChild(sampleHost);

          const commitBtn = ce('button', { class: 'btn', type: 'button' }, [`Import ${totalRows} guests`]);
          const cancelBtn = ce('button', { class: 'btn ghost', type: 'button', onclick: () => {
            csvPreviewHost.innerHTML = '';
            csvInput.value = '';
          } }, ['Cancel']);
          csvPreviewHost.appendChild(ce('div', { class: 'row' }, [cancelBtn, commitBtn]));

          commitBtn.addEventListener('click', async () => {
            if (csvWipeChk.checked && !confirm('This will permanently delete all existing guests before importing. Continue?')) return;
            commitBtn.disabled = true;
            commitBtn.textContent = 'Importing…';
            try {
              const res = await api('/api/import.csv', {
                method: 'POST',
                body: { csv: csvText, mapping, wipeFirst: csvWipeChk.checked },
              });
              toast(`Imported ${res.imported} guests${res.skipped ? ` (${res.skipped} skipped — missing name)` : ''}.`, 'success');
              csvPreviewHost.innerHTML = '';
              csvInput.value = '';
            } catch (e) {
              toast('Import failed: ' + e.message, 'error', 6000);
              commitBtn.disabled = false;
              commitBtn.textContent = `Import ${totalRows} guests`;
            }
          });

          function renderSample() {
            sampleHost.innerHTML = '';
            const table = ce('table');
            const head = ce('thead');
            head.appendChild(ce('tr', {}, FIELDS.map(([_, l]) => ce('th', { text: l }))));
            table.appendChild(head);
            const body = ce('tbody');
            for (const row of sample) {
              body.appendChild(ce('tr', {}, FIELDS.map(([f]) => ce('td', { text: String(row[f] ?? '') }))));
            }
            table.appendChild(body);
            sampleHost.appendChild(table);
          }
          renderSample();
        }
      }
    }

    // ─── Onboarding wizard ────────────────────────────────────────────────
    // Launched once on first admin sign-in when the event title is still a
    // default placeholder. Captures the minimum config needed to produce a
    // non-embarrassing invite — everything else can be polished in Settings.
    const WIZARD_DRAFT_KEY = 'invite-admin:wizardDraft';
    const WIZARD_DONE_KEY  = 'invite-admin:wizardDone';
    const DEFAULT_TITLES = new Set(['', 'Our Celebration', 'Wedding Title', 'Event Title']);

    async function shouldRunWizard() {
      if (localStorage.getItem(WIZARD_DONE_KEY) === '1') return false;
      // /api/bootstrap intentionally omits event for the public payload — we
      // have to ask the admin-only config endpoint to get the real title.
      try {
        const r = await api('/api/config');
        const title = ((r.config && r.config.event && r.config.event.title) || '').trim();
        return DEFAULT_TITLES.has(title);
      } catch {
        return false;
      }
    }

    // Convert an ISO date string to the format <input type="datetime-local">
    // expects ("YYYY-MM-DDTHH:MM"), preserving the viewer's local timezone.
    // Without this, seeding the input with `isoString.slice(0, 16)` shows
    // UTC time labelled as local, so a 2pm IST pick reappears as 8:30am.
    function isoToLocalDatetime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function localDatetimeToIso(local) {
      if (!local) return '';
      const d = new Date(local); // treats local as local tz, which is what we want
      return isNaN(d.getTime()) ? '' : d.toISOString();
    }

    async function runOnboardingWizard() {
      const overlay = ce('div', { class: 'wizard-overlay', role: 'dialog', 'aria-modal': 'true' });
      const card = ce('div', { class: 'wizard-card' });
      overlay.appendChild(card);
      document.body.appendChild(overlay);
      card.appendChild(ce('p', { class: 'muted', text: 'Loading…' }));

      // Fetch current config so re-running the wizard shows current values
      // (not stale bootstrap data or an empty draft). Fall through gracefully
      // if the request fails.
      let serverCfg = {};
      try {
        const r = await api('/api/config');
        serverCfg = (r && r.config) || {};
      } catch {}

      // Remember the live preset so we can roll back if the user closes the
      // wizard without finishing — otherwise step 1 permanently re-themes
      // the admin page with an unsaved preview.
      const originalPreset = serverCfg.themePresetActive || '';

      // Load any partial progress. localStorage draft only wins when it has
      // a value; otherwise we seed from the live server config.
      let data = {};
      try { data = JSON.parse(localStorage.getItem(WIZARD_DRAFT_KEY) || '{}'); } catch {}
      const ev = serverCfg.event || {};
      data.title ||= DEFAULT_TITLES.has((ev.title || '').trim()) ? '' : ev.title;
      data.dateISO ||= ev.dateISO || '';
      data.venue ||= ev.venue || '';
      data.preset ||= serverCfg.themePresetActive || '';
      data.hostedBy ||= ev.hostedBy || '';
      data.hostName ||= '';
      data.hostRole ||= '';
      // Sub-events draft. Seed from existing config on re-run, otherwise
      // start empty → wizard stays in single-event mode unless the user
      // explicitly adds entries in stepEvents.
      if (!Array.isArray(data.events)) {
        data.events = Array.isArray(serverCfg.events)
          ? serverCfg.events.map(e => ({
              id: e.id || '',
              name: e.name || '',
              dateISO: e.dateISO || '',
              venue: e.venue || '',
            }))
          : [];
      }

      // Step list is built dynamically so we can drop the hero step when
      // asset uploads are disabled. Keeps step count + progress dots honest.
      const steps = [
        { name: 'preset',    render: stepPreset },
        { name: 'title',     render: stepTitle },
        { name: 'dateVenue', render: stepDateVenue },
        { name: 'events',    render: stepEvents },
        ...(STATE.features.assetUpload ? [{ name: 'hero', render: stepHero }] : []),
        { name: 'host',      render: stepHost },
      ];
      const totalSteps = steps.length;
      // Clamp stored step index to the current step count (features may have
      // changed between sessions, shrinking the list).
      let stepIdx = Math.max(0, Math.min(totalSteps - 1, Number(data._step) || 0));

      function saveDraft() {
        data._step = stepIdx;
        localStorage.setItem(WIZARD_DRAFT_KEY, JSON.stringify(data));
      }

      function close({ done, revertPreset }) {
        if (done) {
          localStorage.setItem(WIZARD_DONE_KEY, '1');
          localStorage.removeItem(WIZARD_DRAFT_KEY);
        }
        if (revertPreset) {
          const presets = STATE.config.themePresetsFull || STATE.config.themePresets || [];
          const orig = presets.find(p => p.id === originalPreset);
          if (orig && orig.tokens) applyPreset({ tokens: orig.tokens, fontHref: orig.fontHref || '' });
        }
        document.removeEventListener('keydown', onKeyDown);
        overlay.remove();
      }

      // Dismiss without saving — keeps the draft so re-running the wizard
      // resumes where the user left off, but stops it from auto-reopening
      // on every page load by setting the DONE flag.
      function dismiss() {
        saveDraft();
        close({ done: true, revertPreset: true });
      }

      function skipAll() {
        if (!confirm('Skip setup? You can always edit everything in Settings.')) return;
        localStorage.setItem(WIZARD_DONE_KEY, '1');
        localStorage.removeItem(WIZARD_DRAFT_KEY);
        close({ done: false, revertPreset: true });
      }

      function onKeyDown(e) {
        if (e.key === 'Escape') { e.preventDefault(); dismiss(); }
      }
      document.addEventListener('keydown', onKeyDown);

      // Renders the current step's body. Each step returns a DOM node + a
      // validator that must return true before the "Next" button activates.
      function renderStep() {
        card.innerHTML = '';
        const closeBtn = ce('button', { class: 'wizard-close', type: 'button', 'aria-label': 'Close', onclick: dismiss }, ['×']);
        card.appendChild(closeBtn);

        const progress = ce('div', { class: 'wizard-progress' });
        for (let i = 0; i < totalSteps; i++) {
          progress.appendChild(ce('div', { class: 'dot ' + (i < stepIdx ? 'done' : i === stepIdx ? 'active' : '') }));
        }
        card.appendChild(progress);

        const { node, isValid } = steps[stepIdx].render(data);
        const canAdvance = isValid;
        card.appendChild(node);

        const actions = ce('div', { class: 'wizard-actions' });
        const skip = ce('button', { class: 'btn ghost', type: 'button', onclick: skipAll }, ['Skip setup']);
        actions.appendChild(skip);
        const right = ce('div', { class: 'right' });
        if (stepIdx > 0) {
          right.appendChild(ce('button', { class: 'btn ghost', type: 'button', onclick: () => { stepIdx--; saveDraft(); renderStep(); } }, ['Back']));
        }
        const isLast = stepIdx === totalSteps - 1;
        const next = ce('button', {
          class: 'btn', type: 'button',
          onclick: async () => {
            if (!canAdvance()) { toast('Fill the required fields first.', 'error', 3500); return; }
            saveDraft();
            if (!isLast) { stepIdx++; saveDraft(); renderStep(); return; }
            await finish();
          },
        }, [isLast ? 'Finish' : 'Next']);
        right.appendChild(next);
        actions.appendChild(right);
        card.appendChild(actions);
      }

      function stepPreset(data) {
        const wrap = ce('div');
        wrap.appendChild(ce('h2', { text: 'Pick a look' }));
        wrap.appendChild(ce('p', { class: 'hint', text: 'Start with a theme — you can fine-tune colors later in Settings.' }));
        const presets = STATE.config.themePresetsFull || STATE.config.themePresets || [];
        const grid = ce('div', { class: 'preset-grid grid' });
        for (const p of presets) {
          const swatch = ce('div', { class: 'preset-swatch' });
          for (const c of (p.swatch || ['#eee','#888','#222'])) {
            const sw = ce('span'); sw.style.background = c; swatch.appendChild(sw);
          }
          const chip = ce('button', {
            type: 'button',
            class: 'preset-chip' + (data.preset === p.id ? ' active' : ''),
            onclick: () => {
              data.preset = p.id;
              if (p.tokens) applyPreset({ tokens: p.tokens, fontHref: p.fontHref || '' });
              grid.querySelectorAll('.preset-chip').forEach((c, i) => c.classList.toggle('active', presets[i].id === p.id));
            },
          });
          chip.appendChild(swatch);
          chip.appendChild(ce('div', { class: 'label', text: p.label || p.id }));
          if (p.hint) chip.appendChild(ce('div', { class: 'hint', text: p.hint }));
          grid.appendChild(chip);
        }
        wrap.appendChild(grid);
        return { node: wrap, isValid: () => !!data.preset || !presets.length };
      }

      function stepTitle(data) {
        const wrap = ce('div');
        wrap.appendChild(ce('h2', { text: "What's the event?" }));
        wrap.appendChild(ce('p', { class: 'hint', text: 'The title shown front-and-centre on the invite.' }));
        const input = ce('input', { type: 'text', placeholder: 'e.g. Aditi & Rohan · Wedding', value: data.title || '' });
        input.addEventListener('input', () => { data.title = input.value.trim(); });
        wrap.appendChild(ce('label', { class: 'field' }, ['Event title', input]));
        // Hosted by — optional tagline that renders directly under the title
        // on the invite. Separate from hosts[] (which is the side/family
        // strip); this is just a display string.
        const hostedByInput = ce('input', {
          type: 'text',
          placeholder: 'e.g. The Vangam & Rao families',
          value: data.hostedBy || '',
        });
        hostedByInput.addEventListener('input', () => { data.hostedBy = hostedByInput.value.trim(); });
        wrap.appendChild(ce('label', { class: 'field' }, ['Hosted by (tagline under title)', hostedByInput]));
        setTimeout(() => input.focus(), 50);
        return { node: wrap, isValid: () => (data.title || '').trim().length >= 2 };
      }

      function stepDateVenue(data) {
        const wrap = ce('div');
        wrap.appendChild(ce('h2', { text: 'When & where' }));
        wrap.appendChild(ce('p', { class: 'hint', text: 'We use the date for the countdown and calendar file.' }));
        const dateInput = ce('input', { type: 'datetime-local', value: isoToLocalDatetime(data.dateISO) });
        dateInput.addEventListener('input', () => {
          data.dateISO = localDatetimeToIso(dateInput.value);
        });
        wrap.appendChild(ce('label', { class: 'field' }, ['Date & time', dateInput]));
        const venueInput = ce('input', { type: 'text', placeholder: 'e.g. The Grand Ballroom, Mumbai', value: data.venue || '' });
        venueInput.addEventListener('input', () => { data.venue = venueInput.value.trim(); });
        wrap.appendChild(ce('label', { class: 'field' }, ['Venue', venueInput]));
        return { node: wrap, isValid: () => true };
      }

      // Sub-events step — lets the admin declare 0..N ceremonies / sessions
      // (e.g. Ceremony · Reception · Cocktails). Empty list ⇒ single-event
      // mode on the invite (no timeline, no per-event RSVP picker). Every
      // entry gets a stable slug-derived id so later config merges don't
      // duplicate it.
      function stepEvents(data) {
        const wrap = ce('div');
        wrap.appendChild(ce('h2', { text: 'Additional events?' }));
        wrap.appendChild(ce('p', { class: 'hint', text: 'Add ceremonies, receptions, or sessions. Leave empty for a single-event invite.' }));

        const list = ce('div', { class: 'wizard-events' });

        function slugify(s) {
          return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40) || ('event-' + Math.random().toString(36).slice(2, 6));
        }

        function renderRow(entry, idx) {
          const row = ce('div', { class: 'wizard-event-row' });
          const head = ce('div', { class: 'wizard-event-head' });
          head.appendChild(ce('strong', { text: 'Event ' + (idx + 1) }));
          const rm = ce('button', { class: 'btn small ghost', type: 'button' }, ['Remove']);
          rm.addEventListener('click', () => {
            data.events.splice(idx, 1);
            redraw();
          });
          head.appendChild(rm);
          row.appendChild(head);

          const nameInput = ce('input', { type: 'text', placeholder: 'e.g. Ceremony', value: entry.name || '' });
          nameInput.addEventListener('input', () => {
            entry.name = nameInput.value.trim();
            if (!entry.id) entry.id = slugify(entry.name);
          });
          row.appendChild(ce('label', { class: 'field' }, ['Name', nameInput]));

          const dateInput = ce('input', { type: 'datetime-local', value: isoToLocalDatetime(entry.dateISO) });
          dateInput.addEventListener('input', () => { entry.dateISO = localDatetimeToIso(dateInput.value); });
          row.appendChild(ce('label', { class: 'field' }, ['Date & time', dateInput]));

          const venueInput = ce('input', { type: 'text', placeholder: 'Venue (optional)', value: entry.venue || '' });
          venueInput.addEventListener('input', () => { entry.venue = venueInput.value.trim(); });
          row.appendChild(ce('label', { class: 'field' }, ['Venue', venueInput]));

          return row;
        }

        function redraw() {
          list.innerHTML = '';
          if (!data.events.length) {
            list.appendChild(ce('p', { class: 'muted', text: 'No additional events yet.' }));
          } else {
            data.events.forEach((e, i) => list.appendChild(renderRow(e, i)));
          }
          counter.textContent = data.events.length
            ? `${data.events.length} event${data.events.length === 1 ? '' : 's'}`
            : 'Single-event invite';
        }

        const counter = ce('p', { class: 'muted', style: 'margin: 0;' });

        const addBtn = ce('button', { class: 'btn ghost', type: 'button' }, ['+ Add event']);
        addBtn.addEventListener('click', () => {
          data.events.push({ id: '', name: '', dateISO: '', venue: '' });
          redraw();
        });

        wrap.appendChild(counter);
        wrap.appendChild(list);
        wrap.appendChild(addBtn);
        redraw();

        // Valid only when every existing row has a name — block advancing
        // until empty rows are filled or removed, so we don't persist blanks.
        return {
          node: wrap,
          isValid: () => data.events.every(e => (e.name || '').trim().length >= 2),
        };
      }

      function stepHero(data) {
        const wrap = ce('div');
        wrap.appendChild(ce('h2', { text: 'Upload your invite' }));
        wrap.appendChild(ce('p', { class: 'hint', text: 'PDF, JPG, PNG or MP4. This is the art we frame with the RSVP — optional.' }));
        const msg = ce('p', { class: 'muted', text: data.heroUploaded ? '✓ Hero uploaded.' : 'No hero uploaded yet.' });
        const input = ce('input', { type: 'file', accept: 'image/*,video/*,application/pdf' });
        input.addEventListener('change', async () => {
          const file = input.files[0];
          if (!file) return;
          msg.textContent = `Uploading ${file.name}…`;
          const fd = new FormData();
          fd.append('file', file);
          fd.append('role', 'hero');
          try {
            await api('/api/assets', { method: 'POST', body: fd });
            data.heroUploaded = true;
            msg.textContent = '✓ Hero uploaded.';
            saveDraft();
          } catch (e) {
            msg.textContent = 'Upload failed: ' + e.message;
          }
        });
        wrap.appendChild(input);
        wrap.appendChild(msg);
        return { node: wrap, isValid: () => true };
      }

      function stepHost(data) {
        const wrap = ce('div');
        wrap.appendChild(ce('h2', { text: 'Add a hosting side' }));
        wrap.appendChild(ce('p', { class: 'hint', text: 'Optional. Appears as a chip in the "Hosted By" strip (separate from the tagline you set earlier). Add more sides in Settings.' }));
        const nameInput = ce('input', { type: 'text', placeholder: 'e.g. The Sharma Family', value: data.hostName || '' });
        nameInput.addEventListener('input', () => { data.hostName = nameInput.value.trim(); });
        wrap.appendChild(ce('label', { class: 'field' }, ['Side name', nameInput]));
        const roleInput = ce('input', { type: 'text', placeholder: 'e.g. Parents of the bride', value: data.hostRole || '' });
        roleInput.addEventListener('input', () => { data.hostRole = roleInput.value.trim(); });
        wrap.appendChild(ce('label', { class: 'field' }, ['Relationship / role', roleInput]));
        return { node: wrap, isValid: () => true };
      }

      async function finish() {
        try {
          // Fetch fresh config so we PUT back a merged view, not a partial one.
          const cfgRes = await api('/api/config');
          const current = cfgRes.config || {};
          current.event ||= {};
          current.hosts ||= [];
          current.events ||= [];
          if (data.title) current.event.title = data.title;
          if (typeof data.hostedBy === 'string' && data.hostedBy.trim()) {
            current.event.hostedBy = data.hostedBy.trim();
          }
          if (data.dateISO) {
            current.event.dateISO = data.dateISO;
            // Populate dateLabel with a humane fallback if empty.
            if (!current.event.dateLabel) {
              try {
                current.event.dateLabel = new Date(data.dateISO).toLocaleString(undefined, { dateStyle: 'long', timeStyle: 'short' });
              } catch { /* leave unset */ }
            }
          }
          if (data.venue) current.event.venue = data.venue;
          if (data.preset) {
            current.theme ||= {};
            current.themePresetActive = data.preset;
          }
          // Merge wizard events into current.events: update-by-id when the
          // slug matches an existing entry, otherwise append. Keeps user
          // customisations in Settings safe across re-runs of the wizard.
          if (Array.isArray(data.events) && data.events.length) {
            const slugify = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40);
            for (const draft of data.events) {
              const name = (draft.name || '').trim();
              if (!name) continue;
              const id = draft.id || slugify(name) || ('event-' + Math.random().toString(36).slice(2, 6));
              const dateLabel = draft.dateISO
                ? (() => { try { return new Date(draft.dateISO).toLocaleString(undefined, { dateStyle: 'long', timeStyle: 'short' }); } catch { return ''; } })()
                : '';
              const existing = current.events.find(e => e.id === id);
              if (existing) {
                existing.name = name;
                if (draft.dateISO) existing.dateISO = draft.dateISO;
                if (dateLabel && !existing.dateLabel) existing.dateLabel = dateLabel;
                if (draft.venue) existing.venue = draft.venue;
              } else {
                current.events.push({
                  id,
                  name,
                  dateISO: draft.dateISO || '',
                  dateLabel,
                  venue: draft.venue || '',
                });
              }
            }
          }
          if (data.hostName) {
            const slug = (data.hostName || 'host').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40) || 'host';
            // Use the same shape the Settings editor uses:
            // {id, label, slug, role}. Skip if a row with this slug already
            // exists so re-running the wizard doesn't duplicate.
            if (!current.hosts.some(h => h.slug === slug)) {
              current.hosts.push({ id: 'h' + Date.now(), label: data.hostName, slug, role: data.hostRole || '' });
            }
          }
          await api('/api/config', { method: 'PUT', body: { config: current } });
          await loadBootstrap();
          toast('Setup complete — welcome to your invite!', 'success');
          close({ done: true, revertPreset: false });
          renderTabs();
          renderBody();
        } catch (e) {
          toast('Could not save: ' + e.message, 'error', 6000);
        }
      }

      renderStep();
    }

    // ─── Boot ─────────────────────────────────────────────────────────────
    async function boot() {
      await loadBootstrap();
      if (STATE.config.requiresPin && !STATE.token) { showPinGate(); return; }
      renderTabs();
      renderBody();
      hidePinGate();
      if (await shouldRunWizard()) runOnboardingWizard();
    }

    qs('#pin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pin = qs('#pin-input').value;
      try {
        await validatePin(pin);
        hidePinGate();
        renderTabs();
        renderBody();
        if (await shouldRunWizard()) runOnboardingWizard();
      } catch (err) { qs('#pin-err').textContent = err.message; }
    });

    qs('#logout-btn').addEventListener('click', async () => {
      try { await api('/api/logout', { method: 'POST' }); } catch {}
      localStorage.removeItem('invite-admin-token');
      STATE.token = '';
      showPinGate();
    });

    boot().catch(err => {
      console.error('[admin] boot failed:', err);
      qs('#main').innerHTML = '';
      qs('#main').appendChild(ce('p', { class: 'err', text: err.message || String(err) }));
    });
  })();
  </script>
</body>
</html>
