<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title data-copy-key="adminTitle">Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='6' y='6' width='52' height='52' rx='12' fill='%23222'/></svg>"/>
  <style id="theme-vars">
    :root {
      --bg:#faf7f2; --surface:#ffffff; --surface2:#f3efe8;
      --fg:#1a1a1a; --fgMuted:#6b6b6b; --fgSubtle:#9a9a9a;
      --accent:#8b6f47; --accentFg:#ffffff;
      --border:rgba(0,0,0,.1);
      --success:#3a8a4a; --warn:#b07a1f; --danger:#b13a3a;
      --fontDisplay: ui-serif, Georgia, 'Times New Roman', serif;
      --fontBody: system-ui, -apple-system, sans-serif;
      --fontMono: ui-monospace, 'SF Mono', Menlo, monospace;
      --trackingTight:-0.01em; --trackingBase:0; --trackingLoose:.08em;
      --radiusSm:8px; --radius:12px; --radiusLg:20px;
      --shadow1: 0 1px 2px rgba(0,0,0,.05);
      --shadow2: 0 8px 24px rgba(0,0,0,.08);
      --maxWidth: 1200px;
      --motionFast: 120ms; --motionBase: 200ms; --motionSlow: 360ms;
    }
    *,*::before,*::after { box-sizing:border-box; }
    html,body { margin:0; padding:0; }
    body {
      background: var(--bg); color: var(--fg); font-family: var(--fontBody);
      min-height:100dvh; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    header {
      border-bottom: 1px solid var(--border); background: var(--surface);
      padding: 14px 20px; display:flex; align-items:center; justify-content:space-between;
      gap:12px; flex-wrap:wrap; position: sticky; top: 0; z-index: 10;
      backdrop-filter: saturate(140%) blur(6px);
    }
    header h1 { margin:0; font-family: var(--fontDisplay); font-size:1.25rem; font-weight:600; letter-spacing: var(--trackingTight); }
    header nav { display:flex; gap:4px; flex-wrap:wrap; }
    header nav button {
      appearance:none; border:1px solid transparent; background:transparent; color: var(--fgMuted);
      padding:.45em .95em; border-radius:999px; cursor:pointer; font: inherit; font-size:.92em;
      transition: color var(--motionFast) ease, background var(--motionFast) ease, border-color var(--motionFast) ease;
    }
    header nav button:hover { color: var(--fg); background: var(--surface2); }
    header nav button.active { background: var(--fg); color: var(--surface); border-color: var(--fg); }
    main { padding: 22px; max-width: var(--maxWidth); margin: 0 auto; }
    .card {
      background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin: 14px 0; box-shadow: var(--shadow1);
    }
    h2 { margin: 0 0 14px; font-family: var(--fontDisplay); font-size: 1.15rem; font-weight:600; letter-spacing: var(--trackingTight); }
    h3 { margin: 0 0 8px; font-family: var(--fontDisplay); font-weight:600; }
    .muted { color: var(--fgMuted); }
    .subtle { color: var(--fgSubtle); }
    .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    input, select, textarea, button { font: inherit; color: var(--fg); }
    input, select, textarea {
      padding: .55em .7em; border:1px solid var(--border); border-radius: var(--radiusSm);
      background: var(--surface); width: 100%;
      transition: border-color var(--motionFast) ease, box-shadow var(--motionFast) ease;
    }
    input:hover, select:hover, textarea:hover { border-color: color-mix(in srgb, var(--fg) 22%, transparent); }
    label.field { display:grid; gap:4px; font-size:.85em; color: var(--fgMuted); letter-spacing: .02em; }
    .btn {
      display:inline-flex; align-items:center; gap:.4em; appearance:none; border:0; cursor:pointer;
      font-weight:600; padding:.6em 1.1em; border-radius: 999px;
      background: var(--fg); color: var(--surface);
      transition: transform var(--motionFast) ease, background var(--motionFast) ease, color var(--motionFast) ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.small { padding:.4em .85em; font-size:.85em; }
    .btn.ghost { background: transparent; color: var(--fg); border:1px solid var(--border); }
    .btn.ghost:hover { background: var(--surface2); }
    .btn.accent { background: var(--accent); color: var(--accentFg); }
    .btn.danger { background: var(--danger); color: #fff; }
    .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    *:focus { outline: none; }
    *:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px;
    }
    table { width:100%; border-collapse: collapse; font-size:.92em; }
    th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align:left; vertical-align: top; }
    th { background: var(--surface2); font-weight:600; font-size:.8em; text-transform: uppercase; letter-spacing: var(--trackingLoose); color: var(--fgMuted); }
    tbody tr { transition: background var(--motionFast) ease; }
    tbody tr:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }
    .chip { display:inline-block; padding:.18em .65em; border-radius:999px; background: var(--surface2); font-size:.78em; color: var(--fgMuted); }
    .stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
    .stat {
      padding: 14px 16px; border:1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); transition: transform var(--motionFast) ease;
    }
    .stat:hover { transform: translateY(-1px); box-shadow: var(--shadow1); }
    .stat .n { font-family: var(--fontDisplay); font-size: 1.7rem; font-weight: 600; letter-spacing: var(--trackingTight); }
    .stat .l { color: var(--fgMuted); font-size:.78em; text-transform: uppercase; letter-spacing: var(--trackingLoose); margin-top: 4px; }
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius); padding: 28px; text-align:center;
      background: var(--surface2); transition: background var(--motionBase) ease, border-color var(--motionBase) ease;
    }
    .upload-zone.drag { background: color-mix(in srgb, var(--accent) 8%, var(--surface)); border-color: var(--accent); }
    .asset-tile { border:1px solid var(--border); border-radius: var(--radius); padding: 12px; background: var(--surface); }
    .asset-tile img, .asset-tile video {
      width:100%; aspect-ratio: 4/3; object-fit: contain;
      background: var(--surface2); border-radius: var(--radiusSm);
    }
    .asset-tile .foot { display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-size:.82em; }
    #pin-overlay {
      position: fixed; inset: 0; background: rgba(10,10,10,.65); backdrop-filter: blur(8px);
      display:flex; align-items:center; justify-content:center; z-index: 100;
    }
    #pin-overlay .box {
      background: var(--surface); padding: 26px; border-radius: var(--radiusLg);
      width: min(92vw, 380px); box-shadow: var(--shadow2);
    }
    .hidden { display:none !important; }
    .err, .form-msg.is-error { color: var(--danger); }
    .form-msg.is-success { color: var(--success); }
    details summary { cursor:pointer; font-weight:600; }

    /* Preset picker chips */
    .preset-grid {
      display:grid; gap:12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .preset-chip {
      appearance:none; cursor:pointer; text-align:left;
      border:1px solid var(--border); border-radius: var(--radius);
      padding: 14px; background: var(--surface);
      transition: transform var(--motionFast) ease, border-color var(--motionFast) ease, box-shadow var(--motionBase) ease;
      display:flex; flex-direction:column; gap:8px;
    }
    .preset-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow2); }
    .preset-chip.active { border-color: var(--fg); box-shadow: 0 0 0 2px var(--fg) inset; }
    .preset-swatch { display:flex; gap:0; height: 44px; border-radius: var(--radiusSm); overflow: hidden; border:1px solid var(--border); }
    .preset-swatch span { flex:1; }
    .preset-chip .label { font-family: var(--fontDisplay); font-weight:600; font-size:1rem; }
    .preset-chip .hint { color: var(--fgMuted); font-size:.82em; line-height: 1.4; }

    /* Save bar */
    .save-bar {
      position: sticky; bottom: 12px;
      background: var(--surface); border:1px solid var(--border); border-radius: var(--radiusLg);
      padding: 14px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px;
      box-shadow: var(--shadow2); margin: 14px 0;
      transition: border-color var(--motionFast) ease, box-shadow var(--motionBase) ease;
    }
    .save-bar.is-dirty { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent), var(--shadow2); }
    .save-bar .meta { color: var(--fgMuted); font-size: .9em; }
    .save-bar.is-dirty .meta { color: var(--fg); font-weight: 600; }

    /* Toast notifications */
    #toast-host {
      position: fixed; right: 18px; bottom: 18px; z-index: 200;
      display: grid; gap: 10px; pointer-events: none;
      max-width: min(92vw, 360px);
    }
    .toast {
      pointer-events: auto;
      background: var(--surface); color: var(--fg);
      border: 1px solid var(--border); border-left: 4px solid var(--fgMuted);
      border-radius: var(--radiusSm); box-shadow: var(--shadow2);
      padding: 12px 14px; font-size: .92em;
      opacity: 0; transform: translateY(12px);
      transition: opacity var(--motionBase) ease, transform var(--motionBase) ease;
    }
    .toast.show { opacity: 1; transform: none; }
    .toast.success { border-left-color: var(--success); }
    .toast.error   { border-left-color: var(--danger); }
    .toast.info    { border-left-color: var(--accent); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
      .btn:hover, .stat:hover, .preset-chip:hover { transform: none; }
    }

    /* Onboarding wizard modal */
    .wizard-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; animation: wiz-fade 180ms ease;
    }
    @keyframes wiz-fade { from { opacity: 0 } to { opacity: 1 } }
    .wizard-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radiusLg); box-shadow: var(--shadow2);
      width: min(92vw, 560px); max-height: 90vh; overflow-y: auto;
      padding: 28px; display: grid; gap: 18px; position: relative;
    }
    .wizard-close {
      position: absolute; top: 10px; right: 10px;
      width: 32px; height: 32px; border-radius: 50%;
      border: 0; background: transparent; color: var(--fgMuted);
      font-size: 20px; line-height: 1; cursor: pointer;
    }
    .wizard-close:hover { background: var(--border); color: var(--fg); }
    .wizard-progress {
      display: flex; gap: 6px; align-items: center;
    }
    .wizard-progress .dot {
      flex: 1 1 auto; height: 4px; border-radius: 2px;
      background: var(--border); transition: background var(--motionBase) ease;
    }
    .wizard-progress .dot.done   { background: var(--success); }
    .wizard-progress .dot.active { background: var(--accent); }
    .wizard-card h2 { margin: 0; font-family: var(--fontDisplay); font-size: 1.5em; }
    .wizard-card .hint { color: var(--fgMuted); margin: -6px 0 6px; }
    .wizard-actions { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .wizard-actions .right { display: flex; gap: 8px; margin-left: auto; }
    .wizard-card .preset-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
    .wizard-events { display: grid; gap: 12px; margin: 4px 0 2px; }
    .wizard-event-row {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; display: grid; gap: 10px; background: var(--surface2);
    }
    .wizard-event-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .wizard-event-head strong { font-size: .9em; color: var(--fgMuted); font-weight: 600; }

    /* Settings split layout with inline invite preview */
    .settings-split { display: grid; grid-template-columns: 1fr; gap: 18px; align-items: start; }
    .settings-split.with-preview { grid-template-columns: minmax(0, 1fr) minmax(320px, 440px); }
    .settings-left { display: grid; gap: 16px; min-width: 0; }
    .settings-preview {
      position: sticky; top: 78px; display: flex; flex-direction: column; gap: 10px;
      background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
      padding: 12px; box-shadow: var(--shadow1); max-height: calc(100dvh - 96px);
    }
    .settings-preview h3 { margin: 0; font-size: .95em; letter-spacing: var(--trackingLoose); text-transform: uppercase; color: var(--fgMuted); }
    .settings-preview .viewport-switch { display:flex; gap:6px; flex-wrap:wrap; }
    .settings-preview .viewport-switch button {
      border: 1px solid var(--border); background: var(--surface); color: var(--fg);
      border-radius: var(--radiusSm); padding: 5px 10px; font: inherit; font-size: .85em; cursor: pointer;
    }
    .settings-preview .viewport-switch button.active { background: var(--accent); color: var(--accentFg); border-color: var(--accent); }
    .settings-preview .frame-wrap {
      background: var(--surface2); border-radius: var(--radiusSm); overflow: auto;
      flex: 1 1 auto; display: flex; justify-content: center; align-items: flex-start;
      padding: 8px; min-height: 280px;
    }
    .settings-preview .frame-wrap iframe {
      border: 1px solid var(--border); border-radius: var(--radiusSm);
      background: var(--bg); display: block; transition: width var(--motionBase) ease;
    }
    .settings-preview .frame-wrap.vp-desktop iframe { width: 100%; height: 720px; }
    .settings-preview .frame-wrap.vp-tablet iframe  { width: 768px;  height: 1024px; transform-origin: top center; }
    .settings-preview .frame-wrap.vp-mobile iframe  { width: 375px;  height: 667px; }
    @media (max-width: 1100px) {
      .settings-split.with-preview { grid-template-columns: 1fr; }
      .settings-preview { position: static; max-height: none; }
    }

    /* Guest-list filter toolbar + bulk action bar */
    .post-add {
      margin-top: 12px; padding: 12px 14px; border-radius: var(--radius);
      background: color-mix(in srgb, var(--success) 10%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--success) 35%, var(--border));
    }
    .post-add-head strong { color: var(--fg); }
    .guest-toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin: 8px 0 12px; }
    .guest-toolbar .search { flex:1 1 220px; min-width: 0; }
    .guest-toolbar select, .guest-toolbar input[type="text"], .guest-toolbar input[type="search"] {
      height: 36px; padding: 0 10px; border:1px solid var(--border); border-radius: var(--radiusSm);
      background: var(--surface); color: var(--fg); font: inherit; width: 100%;
    }
    .bulk-bar {
      position: sticky; bottom: 12px; z-index: 10;
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      background: var(--surface); border:1px solid var(--accent);
      border-radius: var(--radius); box-shadow: var(--shadow2);
      padding: 10px 14px; margin-top: 12px;
    }
    .bulk-bar .count { font-weight: 600; }
    .bulk-bar .spacer { flex: 1 1 auto; }
    .bulk-bar select { height: 32px; border:1px solid var(--border); border-radius: var(--radiusSm); padding: 0 8px; background: var(--surface); font: inherit; }
    .bulk-bar progress { flex: 1 1 200px; height: 10px; accent-color: var(--accent); }
    .guest-cards { display: none; flex-direction: column; gap: 10px; }
    .guest-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; display: grid; gap: 8px;
    }
    .guest-card .top { display:flex; justify-content:space-between; align-items:start; gap: 8px; }
    .guest-card .name { font-weight: 600; }
    .guest-card .sub { color: var(--fgMuted); font-size: .88em; }
    .guest-card .fields { display:grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .guest-card .actions { display:flex; flex-wrap:wrap; gap: 6px; }
    .guest-card .chk { display:flex; gap:6px; align-items:center; font-size:.85em; color: var(--fgMuted); }
    /* Household grouping: the header row collapses N guests sharing a
       household_id into a single visual unit. Children stay as normal rows
       but gain a subtle left border so the grouping is legible. */
    .hh-row td { background: color-mix(in srgb, var(--accent) 6%, transparent); }
    .hh-row .hh-label { font-weight: 600; }
    .hh-row .hh-meta { color: var(--fgMuted); font-size: .88em; margin-left: 4px; }
    .hh-toggle { background: none; border: 0; color: inherit; cursor: pointer; font: inherit; padding: 0 6px; }
    .hh-child td:nth-child(3) { padding-left: 26px; border-left: 2px solid color-mix(in srgb, var(--accent) 35%, transparent); }
    .guest-card.hh-card { border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); }
    .guest-card.hh-card .hh-members { color: var(--fgMuted); font-size: .88em; margin-top: 2px; }

    @media (max-width: 640px) {
      th.mobile-hide, td.mobile-hide { display:none; }
      main { padding: 14px; }
      .guest-table { display: none; }
      .guest-cards { display: flex; }
      .bulk-bar { position: sticky; bottom: 0; border-radius: var(--radius) var(--radius) 0 0; }
    }
  </style>
</head>
<body>
  <header>
    <h1 data-copy-key="adminTitle">Admin</h1>
    <nav id="tabs"></nav>
    <div>
      <button id="logout-btn" class="btn small ghost hidden">Log out</button>
    </div>
  </header>

  <main id="main"></main>
  <div id="toast-host" aria-live="polite" aria-atomic="false"></div>

  <div id="pin-overlay" class="hidden">
    <div class="box">
      <h2 style="margin-top:0">Enter PIN</h2>
      <form id="pin-form" class="row" style="flex-direction:column; align-items:stretch; gap:10px;">
        <input type="password" id="pin-input" inputmode="numeric" autocomplete="one-time-code" required/>
        <button type="submit" class="btn">Unlock</button>
        <p class="form-msg is-error" id="pin-err" role="alert" aria-live="polite" style="min-height:1.2em; margin:0;"></p>
      </form>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    const STATE = {
      token:    localStorage.getItem('invite-admin-token') || '',
      config:   null,
      features: {},
      copy:     {},
      tab:      null,
      guests:   [],
      assets:   [],
      stats:    null,
      selectedGuestIds: new Set(),
    };

    function ensureFontLink(href) {
      if (!href) return;
      const id = 'preset-font-link';
      let link = document.getElementById(id);
      if (link && link.href === href) return;
      if (!link) {
        link = document.createElement('link');
        link.id = id;
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
      link.href = href;
    }

    function applyPreset(theme) {
      if (!theme || !theme.tokens) return;
      const root = document.documentElement;
      for (const [k, v] of Object.entries(theme.tokens)) {
        if (v != null && v !== '') root.style.setProperty('--' + k, String(v));
      }
      ensureFontLink(theme.fontHref);
    }

    const qs  = (s, r=document) => r.querySelector(s);

    // Toast: transient notification shown bottom-right. Variant: 'success' | 'error' | 'info'.
    function toast(message, variant = 'info', duration = 3500) {
      const host = qs('#toast-host');
      if (!host || !message) return;
      const el = document.createElement('div');
      el.className = `toast ${variant}`;
      el.setAttribute('role', variant === 'error' ? 'alert' : 'status');
      el.textContent = String(message);
      host.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      const close = () => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 300);
      };
      const timer = setTimeout(close, duration);
      el.addEventListener('click', () => { clearTimeout(timer); close(); });
    }

    const ce  = (tag, attrs={}, children=[]) => {
      const el = document.createElement(tag);
      for (const [k,v] of Object.entries(attrs)) {
        if (k === 'class') el.className = v;
        else if (k === 'html') el.innerHTML = v;
        else if (k === 'text') el.textContent = v;
        else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
        else if (v !== undefined && v !== null && v !== false) el.setAttribute(k, v);
      }
      for (const c of [].concat(children)) if (c != null) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      return el;
    };

    async function api(path, opts = {}) {
      const headers = Object.assign({}, opts.headers || {});
      if (STATE.token) headers['x-auth-token'] = STATE.token;
      if (opts.body && !(opts.body instanceof FormData) && !headers['Content-Type']) {
        headers['Content-Type'] = 'application/json';
        opts.body = typeof opts.body === 'string' ? opts.body : JSON.stringify(opts.body);
      }
      const r = await fetch(path, Object.assign({}, opts, { headers }));
      if (r.status === 401) { showPinGate(); throw new Error('auth'); }
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      return data;
    }

    function showPinGate() { qs('#pin-overlay').classList.remove('hidden'); }
    function hidePinGate() { qs('#pin-overlay').classList.add('hidden'); qs('#pin-err').textContent = ''; }

    async function validatePin(pin) {
      const r = await fetch('/api/validate-pin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pin }) });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) throw new Error(data.error || 'Wrong PIN');
      STATE.token = data.token;
      localStorage.setItem('invite-admin-token', data.token);
    }

    async function loadBootstrap() {
      const data = await (await fetch('/api/bootstrap')).json();
      STATE.config   = data;
      STATE.features = data.features || {};
      STATE.copy     = data.copy || {};
      document.querySelectorAll('[data-copy-key]').forEach(el => {
        const key = el.getAttribute('data-copy-key');
        if (STATE.copy[key]) el.textContent = STATE.copy[key];
      });
      if (data.theme) applyPreset(data.theme);
      if (!STATE.tab) {
        const first = tabs()[0];
        if (first) STATE.tab = first[0];
      }
    }

    function tabs() {
      const list = [];
      list.push(['settings', STATE.copy.adminTabSettings || 'Settings']);
      if (STATE.features.assetUpload)   list.push(['assets',  STATE.copy.adminTabAssets  || 'Assets']);
      if (STATE.features.guestManager)  list.push(['guests',  STATE.copy.adminTabGuests  || 'Guests']);
      if (STATE.features.bulkMessaging) list.push(['send',    STATE.copy.adminTabSend    || 'Send']);
      if (STATE.features.csvExport || STATE.features.jsonBackup) list.push(['exports', STATE.copy.adminTabExports || 'Exports']);
      return list;
    }

    function renderTabs() {
      const host = qs('#tabs');
      host.innerHTML = '';
      const list = tabs();
      if (list.length && !list.some(([id]) => id === STATE.tab)) STATE.tab = list[0][0];
      for (const [id, label] of list) {
        const btn = ce('button', {
          class: STATE.tab === id ? 'active' : '',

      qs('#logout-btn').classList.toggle('hidden', !STATE.token);
    }

    async function renderBody() {
      const main = qs('#main');
      main.innerHTML = '';
      if (STATE.tab === 'settings') return renderSettingsTab(main);
      if (STATE.tab === 'assets')  return renderAssetsTab(main);
      if (STATE.tab === 'guests')  return renderGuestsTab(main);

    // ─── Assets tab ───────────────────────────────────────────────────────
    async function renderAssetsTab(host) {
      host.appendChild(ce('div', { class: 'card' }, [
        ce('h2', { text: 'Upload' }),
        ce('p', { class: 'muted', text: 'Upload your invite as PDF, JPG, PNG, or MP4. The app uses the asset tagged "hero" as your main invitation.' }),
        buildUploadZone(),
      ]));
      const list = ce('div', { class: 'card' });
      list.appendChild(ce('h2', { text: 'Uploaded Assets' }));
      const grid = ce('div', { class: 'grid' });
      list.appendChild(grid);
      host.appendChild(list);
      await refreshAssets(grid);
    }

    function buildUploadZone() {
      const zone = ce('div', { class: 'upload-zone' });
      const msg = ce('p', { class: 'muted', text: 'Drop a file here, or click to choose. Pick an event to attach this image to a specific ceremony.' });
      const input = ce('input', { type: 'file', multiple: 'multiple', accept: 'application/pdf,image/jpeg,image/png,image/webp,video/mp4', style: 'display:none' });
      // Lead with an explicit untagged option so a fresh upload doesn't
      // silently inherit the first role in the list (which used to be 'hero',
      // a singleton that wipes any existing main-event hero on upload).
      const roleSel = ce('select', {}, [
        ce('option', { value: '', text: '(untagged)' }),
        ...(STATE.config.assetRoles || []).map(r => ce('option', { value: r, text: r })),
      ]);
      const hostInput = ce('input', { type: 'text', placeholder: 'host slug (optional)', style: 'max-width:180px;' });
      // Event dropdown: '' = main event, or one of the configured sub-events.
      // Omitted entirely when no sub-events are configured, to keep the
      // single-event flow clean.
      const subEvents = Array.isArray(STATE.config.events) ? STATE.config.events : [];
      const eventSel = ce('select', {}, [
        ce('option', { value: '', text: 'Main event' }),
        ...subEvents.map(e => ce('option', { value: e.id || e.name, text: e.name || e.id })),
      ]);
      const btn = ce('button', { class: 'btn', type: 'button', onclick: () => input.click() }, ['Choose file(s)']);
      const status = ce('p', { class: 'muted' });

      async function uploadOne(file) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('role', roleSel.value || '');
        fd.append('hostSlug', hostInput.value.trim().toLowerCase());
        fd.append('eventId', eventSel.value || '');
        return api('/api/assets', { method: 'POST', body: fd });
      }

      const SINGLETON_ROLES = new Set(['hero', 'background']);

      async function doUpload(files) {
        const list = Array.from(files || []).filter(Boolean);
        if (!list.length) return;
        const role = roleSel.value || '';
        const eventId = eventSel.value || '';
        // Singleton guard: warn before clobbering. Either many files into one
        // singleton slot (only the last survives) or replacing an existing
        // singleton in the same scope.
        if (SINGLETON_ROLES.has(role)) {
          if (list.length > 1) {
            const ok = confirm(`Role "${role}" only allows one asset per event. Only the LAST of ${list.length} files will be kept. Continue?`);
            if (!ok) return;
          }
          const existing = (STATE.assets || []).find(a => a.role === role && (a.eventId || '') === eventId);
          if (existing) {
            const where = eventId ? `event "${eventId}"` : 'the main event';
            const ok = confirm(`A "${role}" asset already exists for ${where} (${existing.filename}). Uploading will REPLACE it. Continue?`);
            if (!ok) return;
          }
        }
        let ok = 0, fail = 0;
        for (const file of list) {
          status.textContent = `Uploading ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)\u2026`;
          try { await uploadOne(file); ok++; }
          catch (e) { fail++; toast(`Upload failed for ${file.name}: ${e.message}`, 'error', 6000); }
        }
        status.textContent = '';
        if (ok) toast(`Uploaded ${ok} file${ok === 1 ? '' : 's'}.`, 'success');
        renderBody();
      }

      input.addEventListener('change', () => doUpload(input.files));
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
      zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('drag'); doUpload(e.dataTransfer.files); });

      zone.appendChild(msg);
      const hasHosts = ((STATE.config && STATE.config.hosts) || []).length > 0;
      const fieldRow = [ce('label', { class: 'field' }, ['Role', roleSel])];
      if (subEvents.length) fieldRow.push(ce('label', { class: 'field' }, ['Event', eventSel]));
      if (hasHosts) fieldRow.push(ce('label', { class: 'field' }, ['Host slug', hostInput]));
      zone.appendChild(ce('div', { class: 'row', style: 'justify-content:center; margin:8px 0;' }, fieldRow));
      zone.appendChild(btn);
      zone.appendChild(input);
      zone.appendChild(status);
      return zone;
    }

    async function refreshAssets(grid) {
      grid.innerHTML = '';
      try {
        const data = await api('/api/assets');
        STATE.assets = data.assets || [];
        if (!STATE.assets.length) {
          grid.appendChild(ce('p', { class: 'muted', text: 'No assets yet. Upload your invite to get started.' }));
          return;
        }
        const roleOptions = ['', ...((STATE.config && STATE.config.assetRoles) || [])];
        const subEvents = Array.isArray(STATE.config.events) ? STATE.config.events : [];
        const eventNameFor = (id) => {
          if (!id) return 'Main event';
          const ev = subEvents.find(e => (e.id || e.name) === id);
          return ev ? (ev.name || ev.id) : id;
        };
        for (const a of STATE.assets) {
          const tile = ce('div', { class: 'asset-tile' });
          if ((a.mime || '').startsWith('video/')) tile.appendChild(ce('video', { src: a.url, controls: 'controls', playsinline: 'playsinline' }));
          else tile.appendChild(ce('img', { src: a.thumbUrl || a.url, alt: a.filename }));
          tile.appendChild(ce('div', { class: 'muted', style: 'margin-top:6px; word-break:break-all; font-size:.82em;', text: a.filename }));
          // Badge showing which event this asset is attached to.
          tile.appendChild(ce('div', { class: 'chip', style: 'margin:4px 0;', text: eventNameFor(a.eventId) }));
          const roleSel = ce('select', { 'aria-label': 'Asset role', style: 'max-width:140px;' },
            roleOptions.map(r => ce('option', { value: r, selected: a.role === r ? 'selected' : undefined, text: r || 'untagged' }))
          );
          const eventSel = ce('select', { 'aria-label': 'Asset event', style: 'max-width:140px;' },
            [ce('option', { value: '', selected: !a.eventId ? 'selected' : undefined, text: 'Main event' }),
             ...subEvents.map(e => {
               const id = e.id || e.name;
               return ce('option', { value: id, selected: a.eventId === id ? 'selected' : undefined, text: e.name || id });
             })]
          );
          const status = ce('span', { class: 'subtle', style: 'font-size:.78em;' });
          async function patchField(body, reverter) {
            status.textContent = 'Saving…';
            try {
              await api(`/api/assets/${a.id}`, { method: 'PATCH', body });
              status.textContent = '';
              refreshAssets(grid);
            } catch (e) {
              status.textContent = e.message;
              reverter();
            }
          }
          roleSel.addEventListener('change', () => {
            roleSel.disabled = true;
            patchField({ role: roleSel.value }, () => { roleSel.value = a.role || ''; })
              .finally(() => { roleSel.disabled = false; });
          });
          eventSel.addEventListener('change', () => {
            eventSel.disabled = true;
            patchField({ eventId: eventSel.value }, () => { eventSel.value = a.eventId || ''; })
              .finally(() => { eventSel.disabled = false; });
          });
          const selectors = [ce('label', { class: 'field' }, ['Role', roleSel])];
          if (subEvents.length) selectors.push(ce('label', { class: 'field' }, ['Event', eventSel]));
          tile.appendChild(ce('div', { class: 'foot' }, [
            ce('div', { class: 'row', style: 'gap:6px; flex-wrap:wrap;' }, selectors),
            status,
            ce('button', { class: 'btn small danger', onclick: async () => {
              if (!confirm(`Delete "${a.filename}"?`)) return;
              await api(`/api/assets/${a.id}`, { method: 'DELETE' });
              refreshAssets(grid);
            }}, ['Delete']),
          ]));
          grid.appendChild(tile);
        }
      } catch (e) { grid.appendChild(ce('p', { class: 'err', text: e.message })); }
    }

    // ─── Guests tab ───────────────────────────────────────────────────────
    async function renderGuestsTab(host) {
      const statCard = ce('div', { class: 'card' });
      statCard.appendChild(ce('h2', { text: 'Overview' }));
      const statGrid = ce('div', { class: 'stats' });

      form.appendChild(ce('label', { class: 'field' }, ['Segment', inputs.segment]));

      const submit = ce('button', { class: 'btn', type: 'submit' }, ['Add Guest']);
      form.appendChild(submit);

      // Post-add action panel — appears after a successful add so the admin
      // can send the invite immediately instead of hunting the guest down

      addCard.appendChild(postAdd);

      function renderPostAdd(guest) {
        postAdd.innerHTML = '';
        postAdd.classList.remove('hidden');
        const link = `${location.origin}/i/${guest.inviteToken}`;
        postAdd.appendChild(ce('div', { class: 'post-add-head' }, [
          ce('strong', { text: `✓ Added ${guest.guestName}` }),
          ce('span', { class: 'muted', text: ' — send their invite now?' }),
        ]));
        const row = ce('div', { class: 'row', style: 'flex-wrap:wrap;gap:8px;margin-top:8px' });
        const copyBtn = ce('button', { class: 'btn small ghost', type: 'button', onclick: async () => {
          try { await navigator.clipboard.writeText(link); copyBtn.textContent = 'Copied ✓'; toast('Invite link copied.', 'success', 1600); }
          catch { toast('Could not copy — select the link manually.', 'error'); }
        }}, ['Copy link']);
        row.appendChild(copyBtn);
        if (guest.mobileNumber) {
          const wa = waUrl(guest, link);
          row.appendChild(ce('a', { class: 'btn small', href: wa, target: '_blank', rel: 'noopener', onclick: async () => {
            try { await api(`/api/guests/${guest.id}`, { method: 'PUT', body: { field: 'inviteStatus', value: 'Sent' } }); refreshStats(); refreshGuests(); } catch {}
          }, text: 'WhatsApp' }));
        }
        if (guest.emailAddress && canSendEmail()) {
          const emailBtn = ce('button', { class: 'btn small', type: 'button', onclick: async () => {
            emailBtn.disabled = true; emailBtn.textContent = 'Sending…';
            try {
              await api('/api/send-invite', { method: 'POST', body: { guestId: guest.id, channel: 'email' } });
              emailBtn.textContent = 'Sent ✓';
              toast(`Emailed ${guest.guestName}.`, 'success');
              refreshStats(); refreshGuests();
            } catch (e) {
              emailBtn.disabled = false; emailBtn.textContent = 'Email';
              toast('Email send failed: ' + e.message, 'error', 6000);
            }
          }}, ['Email']);

        }}, ['Add another']);
        row.appendChild(doneBtn);
        postAdd.appendChild(row);
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submit.disabled = true;
        try {
          const body = Object.fromEntries(Object.entries(inputs).map(([k, el]) => [k, el.value]));
          const r = await api('/api/guests', { method: 'POST', body });
          for (const el of Object.values(inputs)) if (el.tagName !== 'SELECT') el.value = '';
          inputs.partySize.value = '1';
          renderPostAdd({
            id: r.id,
            inviteToken: r.inviteToken,
            guestName: body.guestName,
            mobileNumber: body.mobileNumber,
            emailAddress: body.emailAddress,
          });
          refreshGuests();
          refreshStats();
        } catch (err) { toast(err.message || 'Failed to add guest.', 'error', 6000); }
        finally { submit.disabled = false; }
      });

      host.appendChild(addCard);

      const listCard = ce('div', { class: 'card' });
      listCard.appendChild(ce('h2', { text: 'Guests' }));
      const tableHost = ce('div', { id: 'guest-table-host' });
      listCard.appendChild(tableHost);
      host.appendChild(listCard);

      async function refreshStats() {
        try {
          const s = await api('/api/stats');
          STATE.stats = s;
          statGrid.innerHTML = '';
          [
            ['Guests', s.total], ['Attending', s.attending], ['Pending', s.pending], ['Declined', s.declined],
            ['Seats (est.)', s.totalSeats], ['Seats attending', s.attendingSeats],
            // Split so the admin sees how many views came from sharing the
            // base URL (anonymous) vs. a personal invite link (attributed).
            ...(STATE.features.viewAnalytics ? [
              ['Personal views', s.viewsPersonal ?? s.views ?? 0],
              ['Anonymous views', s.viewsAnonymous ?? 0],
              ['Submissions', s.submissions],
            ] : []),
          ].forEach(([l, n]) => statGrid.appendChild(ce('div', { class: 'stat' }, [ce('div', { class: 'n', text: String(n ?? '') }), ce('div', { class: 'l', text: l })])));
        } catch (e) { /* ignore */ }
      }

      // Filter state lives inside the closure so it survives re-renders.
      const filters = { q: '', rsvp: '', inviteStatus: '', group: '' };
      // Selected IDs are a Set so toggling is O(1); cleared on filter change
      // only when a row drops out of view (see visibleGuests).
      const selection = new Set();
      // Households default to collapsed; this Set remembers which ones the
      // admin has expanded. Persists across re-renders within a session.
      const expandedHouseholds = new Set();

      function newHouseholdId() {
        // Short, human-visible, unique enough for in-app grouping; not a
        // security boundary, so Math.random is fine.
        return 'hh_' + Math.random().toString(36).slice(2, 10);
      }

      function groupVisibleByHousehold(visible) {
        // Walks in original order, emitting solo rows or household entries
        // at the position of the household's first visible member. Households
        // with only one visible member degrade to a solo row (there's no
        // grouping value in "1-member household").
        const byHid = new Map();
        for (const g of visible) {
          const hid = (g.householdId || '').trim();
          if (!hid) continue;
          if (!byHid.has(hid)) byHid.set(hid, []);
          byHid.get(hid).push(g);
        }
        const result = [];
        const seen = new Set();
        for (const g of visible) {
          const hid = (g.householdId || '').trim();
          if (!hid) { result.push({ type: 'solo', guest: g }); continue; }
          if (seen.has(hid)) continue;
          seen.add(hid);
          const members = byHid.get(hid);
          if (members.length === 1) result.push({ type: 'solo', guest: members[0] });
          else result.push({ type: 'household', id: hid, members });
        }
        return result;
      }

      function matchesFilters(g) {
        if (filters.rsvp && g.rsvp !== filters.rsvp) return false;
        if (filters.inviteStatus && g.inviteStatus !== filters.inviteStatus) return false;
        if (filters.group && (g.guestGroup || '') !== filters.group) return false;
        if (filters.q) {
          const q = filters.q.toLowerCase();
          const hay = [g.guestName, g.guestGroup, g.mobileNumber, g.emailAddress, g.segment, g.notes]
            .filter(Boolean).join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      }

      async function refreshGuests() {
        try {
          const data = await api('/api/guests');
          STATE.guests = data.rows || [];
          tableHost.innerHTML = '';

          // ── Filter toolbar ─────────────────────────────────────────────
          const toolbar = ce('div', { class: 'guest-toolbar' });
          const search = ce('input', { type: 'search', class: 'search', placeholder: 'Search name, email, phone, group…', value: filters.q });
          let searchTimer = null;
          search.addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { filters.q = search.value.trim(); renderRows(); }, 120);
          });
          const rsvpFilter = ce('select', {}, [
            ce('option', { value: '', text: 'All RSVPs' }),
            ...['Pending','Attending','Maybe','Declined'].map(s => ce('option', { value: s, selected: filters.rsvp === s ? 'selected' : undefined, text: s })),
          ]);
          rsvpFilter.addEventListener('change', () => { filters.rsvp = rsvpFilter.value; renderRows(); });
          const invFilter = ce('select', {}, [
            ce('option', { value: '', text: 'All invite statuses' }),
            ...['Not Sent','Sent','Delivered','Not Invited'].map(s => ce('option', { value: s, selected: filters.inviteStatus === s ? 'selected' : undefined, text: s })),
          ]);
          invFilter.addEventListener('change', () => { filters.inviteStatus = invFilter.value; renderRows(); });
          const uniqueGroups = Array.from(new Set(STATE.guests.map(g => g.guestGroup).filter(Boolean))).sort();
          const groupFilter = ce('select', {}, [
            ce('option', { value: '', text: 'All groups' }),
            ...uniqueGroups.map(g => ce('option', { value: g, selected: filters.group === g ? 'selected' : undefined, text: g })),
          ]);
          groupFilter.addEventListener('change', () => { filters.group = groupFilter.value; renderRows(); });
          toolbar.appendChild(search);
          toolbar.appendChild(rsvpFilter);
          toolbar.appendChild(invFilter);
          if (uniqueGroups.length) toolbar.appendChild(groupFilter);
          tableHost.appendChild(toolbar);

          if (!STATE.guests.length) {
            tableHost.appendChild(ce('p', { class: 'muted', text: 'No guests yet.' }));
            return;
          }

          // rowHost is re-rendered on filter changes without rebuilding the toolbar.
          const rowHost = ce('div');
          tableHost.appendChild(rowHost);

          function renderRows() {
            const visible = STATE.guests.filter(matchesFilters);
            // Prune selection of rows no longer visible.
            for (const id of Array.from(selection)) {
              if (!visible.some(g => g.id === id)) selection.delete(id);
            }
            rowHost.innerHTML = '';

            if (!visible.length) {
              rowHost.appendChild(ce('p', { class: 'muted', text: 'No guests match these filters.' }));
              renderBulkBar(visible);
              return;
            }

            // Desktop table (hidden <640px via .guest-table CSS)
            const grouped = groupVisibleByHousehold(visible);
            const table = ce('table', { class: 'guest-table' });
            const selectAllDesktop = ce('input', { type: 'checkbox' });
            selectAllDesktop.checked = visible.every(g => selection.has(g.id));
            selectAllDesktop.indeterminate = !selectAllDesktop.checked && visible.some(g => selection.has(g.id));
            selectAllDesktop.addEventListener('change', () => {
              if (selectAllDesktop.checked) visible.forEach(g => selection.add(g.id));
              else visible.forEach(g => selection.delete(g.id));
              renderRows();
            });
            const thead = ce('thead');
            thead.appendChild(ce('tr', {}, [
              ce('th', {}, [selectAllDesktop]),
              ce('th', { text: '#' }),
              ce('th', { text: 'Name' }),
              ce('th', { class: 'mobile-hide', text: 'Group' }),
              ce('th', { class: 'mobile-hide', text: 'Phone' }),
              ce('th', { text: 'Party' }),
              ce('th', { text: 'RSVP' }),
              ce('th', { text: 'Invite' }),
              ce('th', { text: '' }),
            ]));
            table.appendChild(thead);
            const tbody = ce('tbody');

            function appendHouseholdHeader(entry) {
              const isExpanded = expandedHouseholds.has(entry.id);
              const memberIds = entry.members.map(m => m.id);
              const headerChk = ce('input', { type: 'checkbox' });
              headerChk.checked = memberIds.every(id => selection.has(id));
              headerChk.indeterminate = !headerChk.checked && memberIds.some(id => selection.has(id));
              headerChk.addEventListener('change', () => {
                if (headerChk.checked) memberIds.forEach(id => selection.add(id));
                else memberIds.forEach(id => selection.delete(id));
                renderRows();
              });
              const toggleBtn = ce('button', { class: 'hh-toggle', type: 'button', 'aria-expanded': String(isExpanded), title: isExpanded ? 'Collapse' : 'Expand' }, [isExpanded ? '▾' : '▸']);
              toggleBtn.addEventListener('click', () => {
                if (isExpanded) expandedHouseholds.delete(entry.id);
                else expandedHouseholds.add(entry.id);
                renderRows();
              });
              const names = entry.members.map(m => m.guestName).filter(Boolean).join(', ');
              const totalParty = entry.members.reduce((sum, m) => sum + (m.partySize || 1), 0);
              const labelCell = ce('td', { colspan: '6' }, [
                toggleBtn,
                ce('span', { class: 'hh-label', text: `Household · ${entry.members.length} guests` }),
                ce('span', { class: 'hh-meta', text: `— ${names}` }),
              ]);
              tbody.appendChild(ce('tr', { class: 'hh-row' }, [
                ce('td', {}, [headerChk]),
                ce('td', { class: 'muted', style: 'font-size:.85em', text: '—' }),
                labelCell,
                ce('td', { text: String(totalParty) }),
                ce('td', { text: '' }),
                ce('td', { text: '' }),
              ]));
            }

            function appendGuestRow(g, isHouseholdChild) {
              const link = `${location.origin}/i/${g.inviteToken}`;
              const chk = ce('input', { type: 'checkbox' });
              chk.checked = selection.has(g.id);
              chk.addEventListener('change', () => {
                if (chk.checked) selection.add(g.id); else selection.delete(g.id);
                renderBulkBar(visible);
                selectAllDesktop.checked = visible.every(x => selection.has(x.id));
                selectAllDesktop.indeterminate = !selectAllDesktop.checked && visible.some(x => selection.has(x.id));
              });
              const rsvpSel = ce('select', {}, ['Pending','Attending','Maybe','Declined'].map(s => ce('option', { value: s, selected: g.rsvp === s ? 'selected' : undefined, text: s })));
              rsvpSel.addEventListener('change', async () => {
                try {
                  await api(`/api/guests/${g.id}`, { method: 'PUT', body: { field: 'rsvp', value: rsvpSel.value } });
                  g.rsvp = rsvpSel.value;
                  refreshStats();
                } catch (e) { toast(e.message, 'error'); }
              });
              const invSel = ce('select', {}, ['Not Sent','Sent','Delivered','Not Invited'].map(s => ce('option', { value: s, selected: g.inviteStatus === s ? 'selected' : undefined, text: s })));
              invSel.addEventListener('change', async () => {
                try {
                  await api(`/api/guests/${g.id}`, { method: 'PUT', body: { field: 'inviteStatus', value: invSel.value } });
                  g.inviteStatus = invSel.value;
                  refreshStats();
                } catch (e) { toast(e.message, 'error'); }
              });
              const copyBtn = ce('button', { class: 'btn small ghost', onclick: () => navigator.clipboard.writeText(link).then(() => { copyBtn.textContent = 'Copied'; toast('Invite link copied.', 'success', 1600); }) }, ['Copy link']);
              const waBtn = g.mobileNumber ? ce('a', { class: 'btn small ghost', href: waUrl(g, link), target: '_blank', rel: 'noopener', text: 'WhatsApp' }) : null;
              const emailBtn = (g.emailAddress && canSendEmail()) ? sendEmailButton(g, 'invite') : null;
              const delBtn = ce('button', { class: 'btn small danger', onclick: async () => {
                if (!confirm(`Delete ${g.guestName}?`)) return;
                try {
                  await api(`/api/guests/${g.id}`, { method: 'DELETE' });
                  refreshGuests(); refreshStats();
                } catch (e) { toast(e.message, 'error'); }
              }}, ['Delete']);
              tbody.appendChild(ce('tr', isHouseholdChild ? { class: 'hh-child' } : {}, [
                ce('td', {}, [chk]),
                ce('td', { text: String(g.id) }),
                ce('td', {}, [g.guestName, ce('br'), ce('span', { class: 'muted', style:'font-size:.85em', text: g.emailAddress || '' })]),
                ce('td', { class: 'mobile-hide', text: g.guestGroup || '' }),
                ce('td', { class: 'mobile-hide', text: g.mobileNumber || '' }),
                ce('td', { text: `${g.partySize || 1}${g.confirmedPartySize != null ? ` → ${g.confirmedPartySize}` : ''}` }),
                ce('td', {}, [rsvpSel]),
                ce('td', {}, [invSel]),
                ce('td', {}, [ce('div', { class: 'row' }, [copyBtn, waBtn, emailBtn, delBtn].filter(Boolean))]),
              ]));
            }

            for (const entry of grouped) {
              if (entry.type === 'solo') { appendGuestRow(entry.guest, false); continue; }
              appendHouseholdHeader(entry);
              if (expandedHouseholds.has(entry.id)) {
                for (const m of entry.members) appendGuestRow(m, true);
              }
            }
            table.appendChild(tbody);
            rowHost.appendChild(table);

            // Mobile card list (shown <640px via .guest-cards CSS)
            const cards = ce('div', { class: 'guest-cards' });

            function appendGuestCard(g) {
              const link = `${location.origin}/i/${g.inviteToken}`;
              const chk = ce('input', { type: 'checkbox' });
              chk.checked = selection.has(g.id);
              chk.addEventListener('change', () => {
                if (chk.checked) selection.add(g.id); else selection.delete(g.id);
                renderBulkBar(visible);
              });
              const rsvpSel = ce('select', {}, ['Pending','Attending','Maybe','Declined'].map(s => ce('option', { value: s, selected: g.rsvp === s ? 'selected' : undefined, text: s })));
              rsvpSel.addEventListener('change', async () => {
                try { await api(`/api/guests/${g.id}`, { method: 'PUT', body: { field: 'rsvp', value: rsvpSel.value } }); g.rsvp = rsvpSel.value; refreshStats(); }
                catch (e) { toast(e.message, 'error'); }
              });
              const invSel = ce('select', {}, ['Not Sent','Sent','Delivered','Not Invited'].map(s => ce('option', { value: s, selected: g.inviteStatus === s ? 'selected' : undefined, text: s })));
              invSel.addEventListener('change', async () => {
                try { await api(`/api/guests/${g.id}`, { method: 'PUT', body: { field: 'inviteStatus', value: invSel.value } }); g.inviteStatus = invSel.value; refreshStats(); }
                catch (e) { toast(e.message, 'error'); }
              });
              const copyBtn = ce('button', { class: 'btn small ghost', onclick: () => navigator.clipboard.writeText(link).then(() => toast('Invite link copied.', 'success', 1600)) }, ['Copy link']);
              const waBtn = g.mobileNumber ? ce('a', { class: 'btn small ghost', href: waUrl(g, link), target: '_blank', rel: 'noopener', text: 'WhatsApp' }) : null;
              const emailBtn = (g.emailAddress && canSendEmail()) ? sendEmailButton(g, 'invite') : null;
              const delBtn = ce('button', { class: 'btn small danger', onclick: async () => {
                if (!confirm(`Delete ${g.guestName}?`)) return;
                try { await api(`/api/guests/${g.id}`, { method: 'DELETE' }); refreshGuests(); refreshStats(); }
                catch (e) { toast(e.message, 'error'); }
              }}, ['Delete']);
              cards.appendChild(ce('div', { class: 'guest-card' }, [
                ce('div', { class: 'top' }, [
                  ce('div', {}, [
                    ce('div', { class: 'name', text: g.guestName }),
                    ce('div', { class: 'sub', text: [g.guestGroup, g.mobileNumber].filter(Boolean).join(' · ') }),
                    g.emailAddress ? ce('div', { class: 'sub', text: g.emailAddress }) : null,
                  ].filter(Boolean)),
                  ce('label', { class: 'chk' }, [chk, 'select']),
                ]),
                ce('div', { class: 'fields' }, [
                  ce('label', { class: 'field' }, [ce('span', { class: 'muted', style: 'font-size:.8em', text: 'RSVP' }), rsvpSel]),
                  ce('label', { class: 'field' }, [ce('span', { class: 'muted', style: 'font-size:.8em', text: 'Invite' }), invSel]),
                ]),
                ce('div', { class: 'actions' }, [copyBtn, waBtn, emailBtn, delBtn].filter(Boolean)),
              ]));
            }

            function appendHouseholdCard(entry) {
              const isExpanded = expandedHouseholds.has(entry.id);
              const memberIds = entry.members.map(m => m.id);
              const chk = ce('input', { type: 'checkbox' });
              chk.checked = memberIds.every(id => selection.has(id));
              chk.indeterminate = !chk.checked && memberIds.some(id => selection.has(id));
              chk.addEventListener('change', () => {
                if (chk.checked) memberIds.forEach(id => selection.add(id));
                else memberIds.forEach(id => selection.delete(id));
                renderRows();
              });
              const toggleBtn = ce('button', { class: 'btn small ghost', type: 'button' }, [isExpanded ? 'Hide members' : 'Show members']);
              toggleBtn.addEventListener('click', () => {
                if (isExpanded) expandedHouseholds.delete(entry.id);
                else expandedHouseholds.add(entry.id);
                renderRows();
              });
              const names = entry.members.map(m => m.guestName).filter(Boolean).join(', ');
              cards.appendChild(ce('div', { class: 'guest-card hh-card' }, [
                ce('div', { class: 'top' }, [
                  ce('div', {}, [
                    ce('div', { class: 'name', text: `Household · ${entry.members.length} guests` }),
                    ce('div', { class: 'hh-members', text: names }),
                  ]),
                  ce('label', { class: 'chk' }, [chk, 'select']),
                ]),
                ce('div', { class: 'actions' }, [toggleBtn]),
              ]));
              if (isExpanded) for (const m of entry.members) appendGuestCard(m);
            }

            for (const entry of grouped) {
              if (entry.type === 'solo') appendGuestCard(entry.guest);
              else appendHouseholdCard(entry);
            }
            rowHost.appendChild(cards);

            renderBulkBar(visible);
          }

          let bulkBarEl = null;
          function renderBulkBar(visible) {
            if (bulkBarEl) { bulkBarEl.remove(); bulkBarEl = null; }
            if (!selection.size) return;
            bulkBarEl = ce('div', { class: 'bulk-bar' });
            bulkBarEl.appendChild(ce('span', { class: 'count', text: `${selection.size} selected` }));
            const rsvpAction = ce('select', {}, [
              ce('option', { value: '', text: 'Set RSVP…' }),
              ...['Pending','Attending','Maybe','Declined'].map(s => ce('option', { value: s, text: s })),
            ]);
            rsvpAction.addEventListener('change', async () => {
              if (!rsvpAction.value) return;
              await bulkApply('setRsvp', rsvpAction.value, `RSVP set to ${rsvpAction.value}`);
            });
            const invAction = ce('select', {}, [
              ce('option', { value: '', text: 'Set invite status…' }),
              ...['Not Sent','Sent','Delivered','Not Invited'].map(s => ce('option', { value: s, text: s })),
            ]);
            invAction.addEventListener('change', async () => {
              if (!invAction.value) return;
              await bulkApply('setInviteStatus', invAction.value, `Invite status set to ${invAction.value}`);
            });
            const groupAction = ce('select', {}, [
              ce('option', { value: '__none__', text: 'Set group…' }),
              ce('option', { value: '', text: '(clear)' }),
              ...(STATE.config.groups || []).map(g => ce('option', { value: g, text: g })),
            ]);
            groupAction.addEventListener('change', async () => {
              if (groupAction.value === '__none__') return;
              const label = groupAction.value || '(cleared)';
              await bulkApply('setGroup', groupAction.value, `Group set to ${label}`);
            });
            // Household link/unlink: link requires 2+ guests and generates a
            // fresh id client-side; unlink only shows when at least one
            // selected guest is currently in a household.
            const selectedGuests = STATE.guests.filter(g => selection.has(g.id));
            const anyInHousehold = selectedGuests.some(g => (g.householdId || '').trim());
            const linkBtn = ce('button', { class: 'btn small ghost', onclick: async () => {
              if (selection.size < 2) {
                toast('Select at least 2 guests to link as a household.', 'info');
                return;
              }
              const hid = newHouseholdId();
              expandedHouseholds.add(hid);
              await bulkApply('setHousehold', hid, `${selection.size} guests linked as a household`);
            }}, ['Link household']);
            const unlinkBtn = anyInHousehold ? ce('button', { class: 'btn small ghost', onclick: async () => {
              await bulkApply('setHousehold', '', 'Household link removed');
            }}, ['Unlink']) : null;
            const delBtn = ce('button', { class: 'btn small danger', onclick: async () => {
              if (!confirm(`Delete ${selection.size} guest${selection.size === 1 ? '' : 's'}?`)) return;
              await bulkApply('delete', undefined, `${selection.size} guests deleted`);
            }}, ['Delete']);
            const clearBtn = ce('button', { class: 'btn small ghost', onclick: () => { selection.clear(); renderRows(); } }, ['Clear']);
            // Bulk email send — shows only when the server has the email
            // channel configured. Skips selected guests without an email
            // address; reports count at the end.
            const sendEmailBtn = canSendEmail()
              ? ce('button', { class: 'btn small', onclick: () => bulkSendEmail('invite') }, ['Send email'])
              : null;
            bulkBarEl.appendChild(rsvpAction);
            bulkBarEl.appendChild(invAction);
            bulkBarEl.appendChild(groupAction);
            bulkBarEl.appendChild(linkBtn);
            if (unlinkBtn) bulkBarEl.appendChild(unlinkBtn);
            if (sendEmailBtn) bulkBarEl.appendChild(sendEmailBtn);
            bulkBarEl.appendChild(ce('span', { class: 'spacer' }));
            bulkBarEl.appendChild(clearBtn);
            bulkBarEl.appendChild(delBtn);
            listCard.appendChild(bulkBarEl);
          }

          // Bulk email sender: iterate one-at-a-time (so a failure shows up
          // immediately and we don't get rate-limited by Resend), update a
          // <progress> bar as we go, and summarize at the end. Server-side
          // each send sets invite_status='Sent' on success.
          async function bulkSendEmail(template) {
            const eligible = STATE.guests.filter(g => selection.has(g.id) && (g.emailAddress || '').trim());
            const skipped = selection.size - eligible.length;
            if (!eligible.length) {
              toast(`None of the selected guests have an email address${skipped ? ' (' + skipped + ' skipped)' : ''}.`, 'error', 6000);
              return;
            }
            const prompt = skipped
              ? `Send email to ${eligible.length} guest${eligible.length === 1 ? '' : 's'}? (${skipped} without email will be skipped.)`
              : `Send email to ${eligible.length} guest${eligible.length === 1 ? '' : 's'}?`;
            if (!confirm(prompt)) return;

            // Replace the bulk bar with a progress UI for the duration of
            // the run. Re-rendering the list at the end recreates the bar.
            if (bulkBarEl) {
              bulkBarEl.innerHTML = '';
              const label = ce('span', { class: 'count', text: `Sending 0 / ${eligible.length}` });
              const bar = ce('progress', { max: String(eligible.length), value: '0' });
              bulkBarEl.appendChild(label);
              bulkBarEl.appendChild(bar);
              let ok = 0, fail = 0;
              for (let i = 0; i < eligible.length; i++) {
                try {
                  await api('/api/send-invite', { method: 'POST', body: { guestId: eligible[i].id, channel: 'email', template } });
                  ok++;
                } catch { fail++; }
                bar.value = String(i + 1);
                label.textContent = `Sending ${i + 1} / ${eligible.length}`;
              }
              const msg = `Sent ${ok} email${ok === 1 ? '' : 's'}` +
                (fail ? `, ${fail} failed` : '') +
                (skipped ? `, ${skipped} skipped (no email)` : '') + '.';
              toast(msg, fail ? 'error' : 'success', 6000);
              selection.clear();
              refreshGuests();
              refreshStats();
            }
          }

          async function bulkApply(action, value, successMsg) {
            const ids = Array.from(selection);
            try {
              await api('/api/guests/bulk', { method: 'POST', body: { ids, action, ...(value !== undefined ? { value } : {}) } });
              selection.clear();
              toast(successMsg, 'success');
              refreshGuests();
              refreshStats();
            } catch (e) {
              toast('Bulk update failed: ' + e.message, 'error', 6000);
            }
          }

          renderRows();
        } catch (e) {
          tableHost.appendChild(ce('p', { class: 'err', text: e.message }));
        }
      }

      refreshStats();
      refreshGuests();
    }

    // Whether the server has the email channel available. Driven by the
    // bootstrap payload — server populates `features.emailChannel` based on
    // presence of RESEND_API_KEY + RESEND_FROM_EMAIL env.
    function canSendEmail() {
      return !!(STATE.features && STATE.features.emailChannel);
    }

    // Shared email-send button factory. Handles the POST, in-flight state,
    // success/error toasts, and post-send list refresh. `template` is either
    // 'invite' or 'reminder'.
    function sendEmailButton(guest, template) {
      const btn = ce('button', { class: 'btn small ghost', type: 'button' }, ['Email']);
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        const original = btn.textContent;
        btn.textContent = 'Sending…';
        try {
          await api('/api/send-invite', { method: 'POST', body: { guestId: guest.id, channel: 'email', template } });
          btn.textContent = 'Sent ✓';
          toast(`Emailed ${guest.guestName}.`, 'success');
          if (typeof refreshStats === 'function') refreshStats();
        } catch (e) {
          btn.textContent = original;
          btn.disabled = false;
          toast('Email failed: ' + e.message, 'error', 6000);
        }
      });
      return btn;
    }

    function waUrl(g, inviteUrl) {
      const tpl = (STATE.config.messaging && STATE.config.messaging.inviteTemplate) || 'Hi {{name}}, {{inviteUrl}}';
      const event = STATE.config.event || {};
      const vars = {
        name: g.guestName || '',
        eventTitle: event.title || '',
        eventDate: event.dateLabel ? ` on ${event.dateLabel}` : '',
        inviteUrl,
        rsvpDeadline: event.rsvpDeadline || '',
      };
      const msg = tpl.replace(/\{\{(\w+)\}\}/g, (_, k) => vars[k] ?? '');
      const phone = (g.mobileNumber || '').replace(/[^0-9]/g, '');
      return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    }

    // ─── Send tab ──────────────────────────────────────────────────────────
    async function renderSendTab(host) {
      const card = ce('div', { class: 'card' });
      card.appendChild(ce('h2', { text: 'Bulk WhatsApp Send' }));
      card.appendChild(ce('p', { class: 'muted', text: 'Step through each guest and open a pre-filled WhatsApp message. After sending, mark the guest "Sent" and move on.' }));
      const list = ce('div', { id: 'send-list' });
      card.appendChild(list);
      host.appendChild(card);

      try {
        const data = await api('/api/guests');
        const guests = (data.rows || []).filter(g => g.mobileNumber);
        if (!guests.length) { list.appendChild(ce('p', { class: 'muted', text: 'No guests with phone numbers yet.' })); return; }
        const state = { idx: 0 };
        const cursor = ce('div');
        const nav = ce('div', { class: 'row', style: 'margin-top:12px' });
        list.appendChild(cursor);
        list.appendChild(nav);
        const paint = () => {
          const g = guests[state.idx];
          cursor.innerHTML = '';
          if (!g) { cursor.appendChild(ce('p', { text: 'All done.' })); nav.innerHTML = ''; return; }
          const link = `${location.origin}/i/${g.inviteToken}`;
          const wa = waUrl(g, link);
          cursor.appendChild(ce('div', { class: 'card' }, [
            ce('div', { class: 'muted', text: `Guest ${state.idx + 1} of ${guests.length}` }),
            ce('h3', { text: g.guestName }),
            ce('p', { class: 'muted', text: `${g.mobileNumber} \u00b7 ${g.guestGroup || 'No group'} \u00b7 ${g.inviteStatus}` }),
            ce('div', { class: 'row' }, [
              ce('a', { class: 'btn', href: wa, target: '_blank', rel: 'noopener', text: 'Open WhatsApp' }),
              ce('button', { class: 'btn ghost', onclick: async () => {
                await api(`/api/guests/${g.id}`, { method: 'PUT', body: { field: 'inviteStatus', value: 'Sent' } });
                state.idx += 1; paint();
              }}, ['Sent → Next']),
              ce('button', { class: 'btn ghost', onclick: () => { state.idx += 1; paint(); }}, ['Skip']),
            ]),
          ]));
        };
        paint();
      } catch (e) { list.appendChild(ce('p', { class: 'err', text: e.message })); }
    }

    // ─── Exports tab ───────────────────────────────────────────────────────
    // ─── Settings tab ─────────────────────────────────────────────────────
    async function renderSettingsTab(host) {
      const loading = ce('p', { class: 'muted', text: 'Loading settings…' });
      host.appendChild(loading);
      let cfg;
      try {
        const r = await api('/api/config');
        cfg = r.config || {};
      } catch (e) {
        loading.textContent = 'Failed to load settings: ' + e.message;
        return;
      }
      host.removeChild(loading);

      const draft = JSON.parse(JSON.stringify(cfg));
      draft.event  ||= {};
      draft.events ||= [];
      draft.hosts  ||= [];
      draft.copy   ||= {};
      draft.features ||= {};
      draft.theme  ||= {};
      draft.messaging ||= {};
      draft.guestSegments ||= [];
      draft.rsvp ||= {};
      draft.rsvp.fields ||= {};
      draft.rsvp.statusOptions = Array.isArray(draft.rsvp.statusOptions) ? draft.rsvp.statusOptions : ['Attending', 'Maybe', 'Declined'];
      if (!draft.themePresetActive) draft.themePresetActive = (STATE.config.theme && STATE.config.theme.active) || '';

      function field(label, value, onInput, opts = {}) {
        const input = ce(opts.type === 'textarea' ? 'textarea' : 'input', {
          value: value ?? '', placeholder: opts.placeholder || '',
          type: opts.type === 'textarea' ? undefined : (opts.type || 'text'),
          rows: opts.type === 'textarea' ? 3 : undefined,
        });
        if (value != null) input.value = value;
        input.addEventListener('input', () => onInput(input.value));
        return ce('label', { class: 'field' }, [label, input]);
      }

      function checkbox(label, value, onChange) {
        const input = ce('input', { type: 'checkbox' });
        input.checked = Boolean(value);
        input.addEventListener('change', () => onChange(input.checked));
        return ce('label', { class: 'field', style: 'flex-direction:row; align-items:center; gap:8px;' }, [input, label]);
      }

      // ── Event identity ────────────────────────────────────────────────
      const identity = ce('div', { class: 'card' }, [ce('h2', { text: 'Event identity' })]);
      const idGrid = ce('div', { class: 'grid' });
      const EV_FIELDS = [
        ['title', 'Event title', 'e.g. Priya & Rahul'],
        ['subtitle', 'Subtitle / tagline', 'e.g. are getting married'],
        ['hostedBy', 'Hosted by (display)', 'e.g. The Vangam & Rao families'],
        ['dateLabel', 'Date (display)', 'e.g. Saturday, Sept 14 2024'],
        ['dateISO', 'Date (ISO, for calendar)', '2024-09-14'],
        ['timeLabel', 'Time (display)', 'e.g. 4:00 PM onwards'],
        ['venue', 'Venue', 'e.g. Taj Krishna'],
        ['address', 'Address', 'e.g. Road No. 1, Banjara Hills'],
        ['city', 'City', 'e.g. Hyderabad'],
        ['mapsUrl', 'Google Maps URL', 'https://maps.google.com/...'],
        ['mapsEmbedUrl', 'Google Maps embed URL (iframe src)', 'https://www.google.com/maps/embed?pb=...'],
        ['rsvpDeadline', 'RSVP deadline (display)', 'e.g. by Aug 30'],
        ['rsvpDeadlineISO', 'RSVP deadline (ISO, for lock)', '2024-08-30'],
        ['dressCode', 'Dress code', 'e.g. Traditional Indian'],
        ['giftRegistry', 'Gift registry URL', 'https://...'],
        ['contactEmail', 'Contact email', 'you@example.com'],
        ['contactPhone', 'Contact phone', '+91 ...'],
      ];
      for (const [key, label, placeholder] of EV_FIELDS) {
        idGrid.appendChild(field(label, draft.event[key], (v) => { draft.event[key] = v; }, { placeholder }));
      }
      identity.appendChild(idGrid);

      // ── Travel / logistics ────────────────────────────────────────────
      draft.event.travel ||= {};
      const travelCard = ce('div', { class: 'card' }, [
        ce('h2', { text: 'Travel & logistics' }),
        ce('p', { class: 'muted', text: 'Each field is optional. The whole card hides on the public invite if every field is empty.' }),
      ]);
      const travelGrid = ce('div', { class: 'grid' });
      const TRAVEL_FIELDS = [
        ['hotelBlock',    'Hotel block',   'e.g. Taj Krishna — room block "VANGAM2026"'],
        ['hotelUrl',      'Hotel URL',     'https://...'],
        ['parking',       'Parking',       'e.g. Valet available; free self-parking'],
        ['transport',     'Transport',     'e.g. Shuttles run 5 PM from Taj lobby'],
        ['accessibility', 'Accessibility', 'e.g. Step-free entry; lift on the west side'],
      ];
      for (const [key, label, placeholder] of TRAVEL_FIELDS) {
        travelGrid.appendChild(field(label, draft.event.travel[key], (v) => { draft.event.travel[key] = v; }, { placeholder }));
      }
      travelCard.appendChild(travelGrid);

      // ── Registries repeater ───────────────────────────────────────────
      draft.event.registries = Array.isArray(draft.event.registries) ? draft.event.registries.slice() : [];
      // Promote the legacy string into the first slot once so admins can
      // edit it in the new UI. Never written back to `giftRegistry` — the
      // server synthesizes the one-item array on merged reads.
      if (!draft.event.registries.length && draft.event.giftRegistry) {
        draft.event.registries.push({ label: 'Gift Registry', url: draft.event.giftRegistry, note: '' });
      }
      const regCard = ce('div', { class: 'card' }, [
        ce('h2', { text: 'Gift registries' }),
        ce('p', { class: 'muted', text: 'Add one or many. Each shows as a row with a "View" button on the public invite.' }),
      ]);
      const regList = ce('div');
      function renderRegistries() {
        regList.innerHTML = '';
        draft.event.registries.forEach((r, i) => {
          const row = ce('div', { class: 'card', style: 'background: var(--surface2)' });
          const grid = ce('div', { class: 'grid' });
          grid.appendChild(field('Label',  r.label,  (v) => { r.label = v; },  { placeholder: 'e.g. Amazon wishlist' }));
          grid.appendChild(field('URL',    r.url,    (v) => { r.url = v; },    { placeholder: 'https://...' }));
          grid.appendChild(field('Note',   r.note,   (v) => { r.note = v; },   { placeholder: 'Optional — shown under the label' }));
          row.appendChild(grid);
          row.appendChild(ce('button', { class: 'btn small danger', style: 'margin-top:10px;',
            onclick: () => { draft.event.registries.splice(i, 1); renderRegistries(); } }, ['Remove']));
          regList.appendChild(row);
        });
      }
      renderRegistries();
      regCard.appendChild(regList);

        ce('h2', { text: 'Messaging templates' }),

      const TOKENS = ['{{name}}', '{{eventTitle}}', '{{eventDate}}', '{{inviteUrl}}', '{{rsvpDeadline}}'];
      function tokenChips(targetTextarea) {
        const wrap = ce('div', { class: 'row', style: 'gap:6px; margin: 6px 0 0;' });
        for (const t of TOKENS) {
          wrap.appendChild(ce('button', {
            type: 'button', class: 'chip', style: 'cursor:pointer; border:1px solid var(--border);',
            onclick: () => {
              const start = targetTextarea.selectionStart ?? targetTextarea.value.length;
              const end   = targetTextarea.selectionEnd   ?? targetTextarea.value.length;
              const before = targetTextarea.value.slice(0, start);
              const after  = targetTextarea.value.slice(end);
              targetTextarea.value = before + t + after;
              targetTextarea.dispatchEvent(new Event('input'));
              targetTextarea.focus();
              const pos = start + t.length;
              targetTextarea.setSelectionRange(pos, pos);
            },
          }, [t]));
        }
        return wrap;
      }
      function templateField(label, key, placeholder, helperText) {
        const ta = ce('textarea', { rows: 3, placeholder });

          ce('label', { class: 'field' }, [label, ta]),

      // ── Guest segments repeater ───────────────────────────────────────
      const segCard = ce('div', { class: 'card' }, [

      const segList = ce('div');
      function renderSegments() {
        segList.innerHTML = '';
        draft.guestSegments.forEach((seg, i) => {
          const row = ce('div', { class: 'card', style: 'background: var(--surface2)' });
          const grid = ce('div', { class: 'grid' });
          grid.appendChild(field('ID (a-z, no spaces)', seg.id, (v) => { seg.id = v.toLowerCase().replace(/[^a-z0-9-]/g, '-'); }, { placeholder: 'e.g. mehendi-only' }));
